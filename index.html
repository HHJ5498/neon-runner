<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GOLDEN DASH: OFFICIAL</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7503206245117361" crossorigin="anonymous"></script>

    <style>
        :root { --gold: #ffcc00; --neon: #00f2ff; --pink: #ff0077; --bg: #050508; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; -webkit-user-select: none; }
        body { height: 100vh; background: #000; overflow: hidden; display: flex; flex-direction: column; font-family: sans-serif; color: white; }
        #game-view { position: relative; flex: 1; width: 100%; background: var(--bg); display: flex; justify-content: center; align-items: center; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        .overlay { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; }
        #title { font-size: 32px; font-weight: 900; color: var(--gold); text-shadow: 0 0 15px var(--gold); margin-bottom: 20px; }
        .settings-box { background: #111; padding: 15px; border-radius: 15px; border: 1px solid #333; width: 100%; max-width: 320px; margin-bottom: 15px; pointer-events: auto; }
        input[type="range"] { width: 100%; height: 35px; accent-color: var(--gold); cursor: pointer; }
        .btn-start { background: var(--gold); color: #000; padding: 18px 70px; font-size: 20px; font-weight: 900; border-radius: 50px; border: none; cursor: pointer; pointer-events: auto; }
        #stat-bar { width: 100%; height: 50px; background: #000; display: flex; justify-content: space-between; align-items: center; padding: 0 25px; border-top: 1px solid #222; }
        
        /* 광고 영역 스타일 */
        #ad-bottom { width: 100%; height: 65px; background: #000; display: flex; justify-content: center; align-items: center; overflow: hidden; }
    </style>
</head>
<body>

    <div id="game-view">
        <canvas id="cvs"></canvas>
        <div id="ovl" class="overlay">
            <div id="title">GOLDEN DASH</div>
            <div class="settings-box">
                <div style="font-size:11px; color:#888; margin-bottom:5px;">엔진 속도</div>
                <input type="range" id="speed-slider" min="1" max="24" value="12">
                <div style="font-size:11px; color:#888; margin-top:10px; margin-bottom:5px;">장애물 규격</div>
                <input type="range" id="size-slider" min="15" max="40" value="20">
            </div>
            <button class="btn-start" id="start-btn">게임 시작</button>
        </div>
    </div>

    <div id="stat-bar">
        <div id="score-txt" style="font-weight:900;">SCORE: 0</div>
        <div id="best-txt" style="color:var(--gold); font-weight:bold;">BEST: 0</div>
    </div>

    <div id="ad-bottom">
        <ins class="adsbygoogle"
             style="display:block; width:320px; height:50px"
             data-ad-client="ca-pub-7503206245117361"
             data-ad-slot="9285335402"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

    <script>
    window.onload = function() {
        const cvs = document.getElementById('cvs');
        const ctx = cvs.getContext('2d');
        cvs.width = 900; cvs.height = 450;
        const sSpeed = document.getElementById('speed-slider'), sSize = document.getElementById('size-slider');
        const ovl = document.getElementById('ovl'), startBtn = document.getElementById('start-btn');

        let isLive = false, score = 0, gauge = 0, isFever = false;
        let player = { x: 120, y: 350, dy: 0, g: 1.2, jCount: 0, hp: 3, invul: 0 };
        let obs = [], items = [], config = { speed: 12, size: 20, timer: 0 };

        function drawHeart(x, y, size, color, empty = false) {
            ctx.save(); ctx.translate(x, y); ctx.beginPath(); ctx.moveTo(0, 0);
            ctx.bezierCurveTo(-size/2, -size/2, -size, size/4, 0, size);
            ctx.bezierCurveTo(size, size/4, size/2, -size/2, 0, 0);
            ctx.fillStyle = empty ? "#222" : color;
            if(!empty) { ctx.shadowBlur = 10; ctx.shadowColor = color; }
            ctx.fill(); ctx.restore();
        }

        function createPattern(s) {
            const size = config.size; const startX = 950; const type = Math.random();
            if(type < 0.4) {
                for(let i=0; i<3; i++) {
                    obs.push({ x: startX + (i*220), y: 395-size, w: size, h: size, s: s });
                    items.push({ x: startX + (i*220) + 30, y: 280, type: 'coin' });
                }
            } else if(type < 0.7) {
                obs.push({ x: startX, y: 395-size, w: size*4, h: size, s: s });
                for(let j=0; j<5; j++) items.push({ x: startX + (j*45), y: 220, type: 'coin' });
            } else {
                obs.push({ x: startX, y: 395-size*2.2, w: size, h: size*2.2, s: s });
                items.push({ x: startX + 50, y: 200, type: (Math.random() < 0.3 ? 'heart' : 'coin') });
            }
        }

        const jump = (e) => {
            if(!isLive || e.target === startBtn || e.target.closest('.settings-box')) return;
            if(player.jCount < 2) {
                const s = (config.speed + (score/2500));
                player.dy = (player.jCount === 0) ? -(17 + (s * 0.65)) : -(17 + (s * 0.65)) * 0.82;
                player.jCount++;
            }
        };

        window.addEventListener('touchstart', (e) => { jump(e); if(isLive) e.preventDefault(); }, { passive: false });
        window.addEventListener('mousedown', jump);
        startBtn.onclick = (e) => { e.stopPropagation(); isLive = true; ovl.style.display = 'none'; score = 0; player.hp = 3; obs = []; items = []; config.speed = parseInt(sSpeed.value); config.size = parseInt(sSize.value); };

        function update() {
            if(!isLive) return;
            let s = (config.speed + (score/2500)) * (isFever ? 1.4 : 1);
            player.dy += 0.88 + (s * 0.04); player.y += player.dy;
            if(player.y > 350) { player.y = 350; player.dy = 0; player.jCount = 0; }
            if(player.invul > 0) player.invul--;
            score += s/10; config.timer -= s;
            if(config.timer <= 0) { createPattern(s); config.timer = (450 + Math.random() * 300) * (12/s); }
            obs.forEach((o, i) => {
                o.x -= o.s;
                if(!isFever && player.invul <= 0 && player.x + 10 < o.x + o.w && player.x + 30 > o.x && player.y + 40 > o.y) {
                    player.hp--; player.invul = 60; if(player.hp <= 0) { isLive = false; ovl.style.display = 'flex'; }
                }
                if(o.x < -500) obs.splice(i, 1);
            });
            items.forEach((it, i) => {
                it.x -= s;
                if(Math.abs(player.x - it.x) < 45 && Math.abs(player.y - it.y) < 60) {
                    if(it.type === 'coin') { gauge += 8; if(gauge >= 100) isFever = true; }
                    else { if(player.hp < 3) player.hp++; }
                    items.splice(i, 1);
                }
            });
            if(isFever) { gauge -= 0.4; if(gauge <= 0) isFever = false; }
            document.getElementById('score-txt').innerText = "SCORE: " + Math.floor(score);
        }

        function draw() {
            ctx.fillStyle = "#050508"; ctx.fillRect(0, 0, 900, 450);
            ctx.strokeStyle = isFever ? "#ffcc00" : "#222";
            ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(0, 395); ctx.lineTo(900, 395); ctx.stroke();
            for(let i=0; i<3; i++) drawHeart(55 + (i*42), 55, 17, "#ffcc00", i >= player.hp);
            if(player.invul % 10 < 5) {
                ctx.fillStyle = isFever ? "#fff" : (player.jCount === 2 ? "#ffcc00" : "#00f2ff");
                ctx.fillRect(player.x, player.y, 40, 45);
            }
            ctx.fillStyle = "#ff0077"; obs.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h || config.size));
            items.forEach(it => {
                if(it.type === 'coin') { ctx.fillStyle = "#ffcc00"; ctx.beginPath(); ctx.arc(it.x, it.y, 8, 0, 7); ctx.fill(); }
                else { drawHeart(it.x, it.y, 15, "#ffcc00"); }
            });
        }
        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    };
    </script>
</body>
</html>
