<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Runner</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7503206245117361" crossorigin="anonymous"></script>

    <style>
        :root { --gold: #ffcc00; --neon: #00f2ff; --pink: #ff0077; --bg: #050508; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; -webkit-user-select: none; }
        
        /* [PC/모바일 공용 레이아웃 최적화] */
        body { 
            height: 100vh; 
            height: -webkit-fill-available; 
            background: #000; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            font-family: 'Pretendard', sans-serif; 
            color: white; 
        }
        
        /* 게임 화면이 잘리지 않도록 max-height 설정 추가 */
        #game-container { 
            position: relative; 
            flex: 1; 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: var(--bg);
            overflow: hidden;
        }

        /* 캔버스 비율 유지 (900:450) */
        canvas { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
            background: #000;
        }
        
        /* 메뉴 레이어 디자인 강화 */
        .overlay { 
            position: absolute; 
            inset: 0; 
            background: rgba(0, 0, 0, 0.9); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 100;
        }

        #title { font-size: clamp(32px, 8vw, 48px); font-weight: 900; color: var(--gold); text-shadow: 0 0 20px var(--gold); margin-bottom: 5px; }
        
        /* 랭킹 표시 영역 강조 */
        .rank-box { margin-bottom: 25px; text-align: center; }
        .rank-label { font-size: 14px; color: #888; letter-spacing: 3px; margin-bottom: 5px; }
        .rank-value { font-size: clamp(28px, 6vw, 36px); font-weight: 900; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.4); }

        .settings-wrap { 
            background: rgba(255,255,255,0.07); 
            padding: 20px; 
            border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.1); 
            width: 90%; 
            max-width: 360px; 
            margin-bottom: 20px; 
        }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: bold; }
        .badge { background: var(--gold); color: #000; padding: 3px 12px; border-radius: 6px; font-size: 14px; }
        
        .diff-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 10px; }
        .diff-btn { background: #1a1a1a; border: 1px solid #333; color: #777; padding: 12px 0; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
        .diff-btn.active { background: var(--gold); border-color: var(--gold); color: #000; box-shadow: 0 0 15px rgba(255,204,0,0.4); }

        input[type="range"] { width: 100%; height: 8px; accent-color: var(--gold); cursor: pointer; margin: 15px 0 20px; }
        .btn-start { background: var(--gold); color: #000; padding: 20px 80px; font-size: 24px; font-weight: 900; border-radius: 100px; border: none; cursor: pointer; transition: 0.3s; }
        .btn-start:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--gold); }

        /* 하단 정보바 & 광고 레이아웃 고정 */
        #bottom-bar { width: 100%; height: 50px; background: #000; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; border-top: 1px solid #222; z-index: 10; font-size: 14px; font-weight: bold; }
        #ad-area { width: 100%; height: 70px; background: #000; display: flex; justify-content: center; align-items: center; border-top: 1px solid #222; overflow: hidden; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="cvs"></canvas>
        <div id="ovl" class="overlay">
            <div id="title">NEON RUNNER</div>
            
            <div class="rank-box">
                <div class="rank-label">TOP SCORE</div>
                <div id="menu-best" class="rank-value">0</div>
            </div>

            <div class="settings-wrap">
                <div class="row"><span>ENGINE SPEED</span><span id="speed-val" class="badge">12</span></div>
                <input type="range" id="speed-slider" min="1" max="24" value="12">
                <div class="row"><span>DIFFICULTY</span><span id="diff-label" class="badge">2</span></div>
                <div class="diff-grid" id="diff-selector">
                    <button class="diff-btn" data-level="1">1</button>
                    <button class="diff-btn active" data-level="2">2</button>
                    <button class="diff-btn" data-level="3">3</button>
                    <button class="diff-btn" data-level="4">4</button>
                    <button class="diff-btn" data-level="5">5</button>
                </div>
            </div>
            <button class="btn-start" id="start-btn">GAME START</button>
        </div>
    </div>

    <div id="bottom-bar">
        <div id="score-txt">SCORE: 0</div>
        <div id="best-txt" style="color:var(--gold);">BEST: 0</div>
    </div>

    <div id="ad-area">
        <ins class="adsbygoogle"
             style="display:inline-block; width:320px; height:50px"
             data-ad-client="ca-pub-7503206245117361"
             data-ad-slot="9285335402"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <script>
    window.onload = function() {
        const cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
        cvs.width = 900; cvs.height = 450;
        
        const ovl = document.getElementById('ovl'), startBtn = document.getElementById('start-btn');
        const sSpeed = document.getElementById('speed-slider'), vSpeed = document.getElementById('speed-val');
        const diffBtns = document.querySelectorAll('.diff-btn'), diffLabel = document.getElementById('diff-label');
        const menuBest = document.getElementById('menu-best');

        let isLive = false, score = 0, currentDiff = 2;
        let player = { x: 120, y: 350, dy: 0, jCount: 0, hp: 3, invul: 0 };
        let obs = [], items = [], config = { speed: 12, timer: 0 };

        const diffSettings = {
            1: { sm: 0.8, spm: 1.3, g: 2.4 },
            2: { sm: 1.0, spm: 1.0, g: 2.6 },
            3: { sm: 1.3, spm: 0.8, g: 2.8 },
            4: { sm: 1.6, spm: 0.7, g: 3.0 },
            5: { sm: 2.0, spm: 0.5, g: 3.2 }
        };

        const updateBestDisplay = () => {
            const best = Math.floor(localStorage.getItem('nr_best') || 0);
            menuBest.innerText = best;
            document.getElementById('best-txt').innerText = "BEST: " + best;
        };
        updateBestDisplay();

        sSpeed.oninput = () => { vSpeed.innerText = sSpeed.value; };
        diffBtns.forEach(btn => {
            btn.onclick = () => {
                diffBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentDiff = parseInt(btn.dataset.level);
                diffLabel.innerText = currentDiff;
            };
        });

        function drawHeart(x, y, size, color, empty = false) {
            ctx.save(); ctx.translate(x, y); ctx.beginPath(); ctx.moveTo(0, 0);
            ctx.bezierCurveTo(-size/2, -size/2, -size, size/4, 0, size);
            ctx.bezierCurveTo(size, size/4, size/2, -size/2, 0, 0);
            ctx.fillStyle = empty ? "#222" : color;
            if(!empty) { ctx.shadowBlur = 10; ctx.shadowColor = color; }
            ctx.fill(); ctx.restore();
        }

        const jump = (e) => {
            if(!isLive || e.target.closest('.settings-wrap') || e.target === startBtn) return;
            if(player.jCount < 2) {
                const s = (config.speed + (score/2000)) * 0.1;
                player.dy = (player.jCount === 0) ? -(24 + s) : -(18 + s);
                player.jCount++;
            }
        };

        window.addEventListener('touchstart', (e) => { if(isLive) e.preventDefault(); jump(e); }, { passive: false });
        window.addEventListener('mousedown', jump);
        
        startBtn.onclick = () => {
            const d = diffSettings[currentDiff];
            config.speed = parseInt(sSpeed.value) * d.sm;
            config.gravity = d.g;
            player = { x: 120, y: 350, dy: 0, jCount: 0, hp: 3, invul: 0 };
            obs = []; items = []; score = 0; isLive = true;
            ovl.style.display = 'none';
        };

        function update() {
            if(!isLive) return;
            const d = diffSettings[currentDiff];
            let s = config.speed + (score/2000);
            player.dy += config.gravity; player.y += player.dy;
            if(player.y > 350) { player.y = 350; player.dy = 0; player.jCount = 0; }
            if(player.invul > 0) player.invul--;
            score += (s/10) * currentDiff; 
            config.timer -= s;
            if(config.timer <= 0) { 
                const pattern = Math.random();
                if(pattern < 0.3) {
                    for(let i=0; i<2; i++) obs.push({ x: 950 + (i * 280), y: 375, w: 20, h: 20, s: s });
                } else {
                    obs.push({ x: 950, y: 375, w: 20, h: 20, s: s });
                }
                if(Math.random() < 0.2) items.push({ x: 1050, y: 220, type: 'heart' });
                config.timer = (450 + Math.random() * 300) * (12/s) * d.spm; 
            }
            obs.forEach((o, i) => { o.x -= o.s; if(player.invul <= 0 && player.x + 5 < o.x + o.w && player.x + 30 > o.x && player.y + 40 > o.y) { player.hp--; player.invul = 60; if(player.hp <= 0) { isLive = false; const best = localStorage.getItem('nr_best') || 0; if(score > best) localStorage.setItem('nr_best', score); updateBestDisplay(); ovl.style.display = 'flex'; } } if(o.x < -100) obs.splice(i, 1); });
            items.forEach((it, i) => { it.x -= s; if(Math.abs(player.x - it.x) < 45 && Math.abs(player.y - it.y) < 60) { if(it.type === 'heart' && player.hp < 3) player.hp++; items.splice(i, 1); } });
            document.getElementById('score-txt').innerText = "SCORE: " + Math.floor(score);
        }

        function draw() {
            ctx.fillStyle = "#050508"; ctx.fillRect(0, 0, 900, 450);
            ctx.strokeStyle = "#222"; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(0, 395); ctx.lineTo(900, 395); ctx.stroke();
            for(let i=0; i<3; i++) drawHeart(55 + (i*42), 55, 17, "#ffcc00", i >= player.hp);
            if(player.invul % 10 < 5) { ctx.fillStyle = player.jCount === 2 ? "#ffcc00" : "#00f2ff"; ctx.shadowBlur = 10; ctx.shadowColor = ctx.fillStyle; ctx.fillRect(player.x, player.y, 40, 45); ctx.shadowBlur = 0; }
            ctx.fillStyle = "#ff0077"; ctx.shadowBlur = 8; ctx.shadowColor = "#ff0077"; obs.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h)); ctx.shadowBlur = 0;
            items.forEach(it => { if(it.type === 'heart') drawHeart(it.x, it.y, 15, "#ffcc00"); });
        }
        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    };
    </script>
</body>
</html>
