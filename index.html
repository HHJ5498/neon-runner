<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Runner</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7503206245117361" crossorigin="anonymous"></script>

    <style>
        :root { --gold: #ffcc00; --neon: #00f2ff; --pink: #ff0077; --bg: #050508; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; }
        html, body { height: 100dvh; background: #000; overflow: hidden; font-family: sans-serif; color: white; }
        body { display: flex; flex-direction: column; }

        #game-area {
            flex: 1; position: relative; display: flex; justify-content: center; align-items: center;
            background: var(--bg); padding: 20px 10px; overflow: hidden;
        }

        #canvas-box {
            position: relative; width: 100%; max-width: 900px; 
            max-height: 70vh; aspect-ratio: 2 / 1;
            display: flex; justify-content: center; align-items: center;
        }

        canvas { width: 100%; height: 100%; background: #000; border: 2px solid #222; display: block; border-radius: 8px; }

        #ovl {
            position: absolute; inset: 0; background: rgba(0, 0, 0, 0.96);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; padding: 15px;
        }

        #title { font-size: clamp(20px, 5vw, 32px); font-weight: 900; color: var(--gold); text-shadow: 0 0 15px var(--gold); margin-bottom: 8px; }

        .rank-list {
            width: 100%; max-width: 240px; background: rgba(255,255,255,0.05);
            border-radius: 12px; padding: 8px; margin-bottom: 10px; border: 1px solid rgba(255,204,0,0.2);
        }
        .rank-row { display: flex; justify-content: space-between; padding: 2px 10px; font-size: 12px; color: #ccc; }
        .rank-row.top { color: var(--gold); font-weight: bold; }

        .controls {
            width: 100%; max-width: 300px; background: rgba(255,255,255,0.03);
            padding: 10px; border-radius: 12px; margin-bottom: 12px; pointer-events: auto;
        }
        .label-row { display: flex; justify-content: space-between; font-weight: bold; font-size: 11px; margin-bottom: 4px; }
        .badge { background: var(--gold); color: #000; padding: 1px 6px; border-radius: 4px; font-size: 10px; }

        .diff-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-top: 4px; }
        .diff-btn { 
            background: #222; border: 1px solid #444; color: #888; padding: 6px 0;
            border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px;
        }
        .diff-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }

        input[type="range"] { width: 100%; height: 5px; accent-color: var(--gold); margin: 8px 0 12px; cursor: pointer; }

        .btn-start { 
            background: var(--gold); color: #000; padding: 12px 60px; 
            font-size: 18px; font-weight: 900; border-radius: 50px; 
            border: none; cursor: pointer;
        }

        #stat-bar { height: 40px; background: #000; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-top: 1px solid #222; font-weight: bold; font-size: 13px; }
        #ad-box { height: 60px; background: #000; display: flex; justify-content: center; align-items: center; border-top: 1px solid #222; }
    </style>
</head>
<body>

    <div id="game-area">
        <div id="canvas-box">
            <canvas id="cvs"></canvas>
            
            <div id="ovl">
                <div id="title">NEON RUNNER</div>
                
                <div class="rank-list" id="rank-ui">
                    <div class="rank-row top"><span>1ST</span><span id="r1">0</span></div>
                    <div class="rank-row"><span>2ND</span><span id="r2">0</span></div>
                    <div class="rank-row"><span>3RD</span><span id="r3">0</span></div>
                    <div class="rank-row"><span>4TH</span><span id="r4">0</span></div>
                    <div class="rank-row"><span>5TH</span><span id="r5">0</span></div>
                </div>

                <div class="controls">
                    <div class="label-row"><span>SPEED</span><span id="s-val" class="badge">12</span></div>
                    <input type="range" id="s-input" min="1" max="24" value="12">
                    <div class="label-row"><span>DIFFICULTY</span><span id="d-val" class="badge">2</span></div>
                    <div class="diff-grid">
                        <button class="diff-btn" data-v="1">1</button>
                        <button class="diff-btn active" data-v="2">2</button>
                        <button class="diff-btn" data-v="3">3</button>
                        <button class="diff-btn" data-v="4">4</button>
                        <button class="diff-btn" data-v="5">5</button>
                    </div>
                </div>
                
                <button class="btn-start" id="start-btn">GAME START</button>
            </div>
        </div>
    </div>

    <div id="stat-bar">
        <div id="now-score">SCORE: 0</div>
        <div id="top-score" style="color:var(--gold);">TOP: 0</div>
    </div>

    <div id="ad-box">
        <ins class="adsbygoogle"
             style="display:block; width:320px; height:50px"
             data-ad-client="ca-pub-7503206245117361"
             data-ad-slot="9285335402"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <script>
    window.onload = function() {
        const cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
        cvs.width = 900; cvs.height = 450;

        const ovl = document.getElementById('ovl'), startBtn = document.getElementById('start-btn');
        const sInput = document.getElementById('s-input'), sVal = document.getElementById('s-val');
        const dBtn = document.querySelectorAll('.diff-btn'), dVal = document.getElementById('d-val');

        let isLive = false, score = 0, curLv = 2;
        let p = { x: 120, y: 350, dy: 0, jc: 0, hp: 3, inv: 0 };
        let obs = [], items = [], cfg = { spd: 12, timer: 0, grav: 3.2 };

        const lvSet = {
            1: { sm: 0.8, g: 3.0 }, 2: { sm: 1.0, g: 3.2 }, 3: { sm: 1.3, g: 3.5 },
            4: { sm: 1.6, g: 3.8 }, 5: { sm: 2.0, g: 4.2 }
        };

        const syncRanks = () => {
            let rs = JSON.parse(localStorage.getItem('nr_top5_vFinal_2') || "[0,0,0,0,0]");
            rs.forEach((v, i) => { document.getElementById('r'+(i+1)).innerText = Math.floor(v); });
            document.getElementById('top-score').innerText = "TOP: " + Math.floor(rs[0]);
        };
        const saveScore = (s) => {
            let rs = JSON.parse(localStorage.getItem('nr_top5_vFinal_2') || "[0,0,0,0,0]");
            rs.push(s); rs.sort((a,b)=>b-a);
            localStorage.setItem('nr_top5_vFinal_2', JSON.stringify(rs.slice(0,5)));
            syncRanks();
        };
        syncRanks();

        sInput.oninput = () => { sVal.innerText = sInput.value; };
        dBtn.forEach(b => {
            b.onclick = (e) => {
                e.stopPropagation();
                dBtn.forEach(x => x.classList.remove('active'));
                b.classList.add('active');
                curLv = parseInt(b.dataset.v);
                dVal.innerText = curLv;
            };
        });

        startBtn.onclick = function(e) {
            e.stopPropagation();
            const set = lvSet[curLv];
            cfg.spd = parseInt(sInput.value) * set.sm;
            cfg.grav = set.g;
            p = { x: 120, y: 350, dy: 0, jc: 0, hp: 3, inv: 0 };
            obs = []; items = []; score = 0; isLive = true;
            ovl.style.display = 'none';
        };

        const jump = (e) => {
            if(!isLive || e.target.closest('.controls') || e.target === startBtn) return;
            if(p.jc < 2) {
                p.dy = (p.jc === 0) ? -29 : -23; 
                p.jc++;
            }
        };

        window.addEventListener('mousedown', jump);
        window.addEventListener('touchstart', (e) => {
            if(isLive && !e.target.closest('#ovl')) e.preventDefault();
            jump(e);
        }, { passive: false });

        function drawHeart(x, y, s, col, empty) {
            ctx.save(); ctx.translate(x, y); ctx.beginPath();
            ctx.bezierCurveTo(-s/2,-s/2,-s,s/4,0,s); ctx.bezierCurveTo(s,s/4,s/2,-s/2,0,0);
            ctx.fillStyle = empty ? "#222" : col; ctx.fill(); ctx.restore();
        }

        // --- [신규] 다양한 장애물 패턴 생성 함수 ---
        function spawnPattern(s) {
            const r = Math.random();
            if (r < 0.3) { // 패턴 1: 단일 장애물
                obs.push({ x: 950, y: 375, w: 22, h: 22, s: s });
            } else if (r < 0.5) { // 패턴 2: 연속 2개 (2단 점프 유도)
                obs.push({ x: 950, y: 375, w: 22, h: 22, s: s });
                obs.push({ x: 1100, y: 375, w: 22, h: 22, s: s });
            } else if (r < 0.7) { // 패턴 3: 높은 벽 (타이밍 중요)
                obs.push({ x: 950, y: 355, w: 22, h: 42, s: s });
            } else if (r < 0.85) { // 패턴 4: 공중 장애물 (점프 조절 필요)
                obs.push({ x: 950, y: 280, w: 25, h: 25, s: s });
            } else { // 패턴 5: 넓은 함정
                obs.push({ x: 950, y: 375, w: 60, h: 22, s: s });
            }
            if(Math.random() < 0.15) items.push({ x: 1150, y: 180 + Math.random()*100 });
        }

        function loop() {
            if(isLive) {
                let s = cfg.spd + (score/2500);
                p.dy += cfg.grav; p.y += p.dy;
                if(p.y > 350) { p.y = 350; p.dy = 0; p.jc = 0; }
                if(p.inv > 0) p.inv--;
                score += s/10; cfg.timer -= s;

                if(cfg.timer <= 0) {
                    spawnPattern(s);
                    cfg.timer = (450 + Math.random() * 450) * (15/s);
                }

                obs.forEach((o, i) => {
                    o.x -= o.s;
                    // --- [수정] 피격 판정 완화 (반 블록 정도의 여백 적용) ---
                    // 캐릭터 크기가 40x45이므로, 상하좌우에 10px 정도의 여백(히트박스 축소)을 둠
                    let px = p.x + 8, py = p.y + 8, pw = 24, ph = 29; 
                    if(p.inv <= 0 && px < o.x + o.w && px + pw > o.x && py < o.y + o.h && py + ph > o.y) {
                        p.hp--; p.inv = 60;
                        if(p.hp <= 0) { isLive = false; saveScore(score); ovl.style.display = 'flex'; }
                    }
                    if(o.x < -200) obs.splice(i, 1);
                });

                items.forEach((it, i) => {
                    it.x -= s;
                    if(Math.abs(p.x - it.x) < 40 && Math.abs(p.y - it.y) < 70) {
                        if(p.hp < 3) p.hp++;
                        items.splice(i, 1);
                    }
                    if(it.x < -100) items.splice(i, 1);
                });
                document.getElementById('now-score').innerText = "SCORE: " + Math.floor(score);
            }

            ctx.fillStyle = "#050508"; ctx.fillRect(0, 0, 900, 450);
            ctx.strokeStyle = "#333"; ctx.lineWidth = 2; ctx.strokeRect(0, 397, 900, 2);
            for(let i=0; i<3; i++) drawHeart(50+(i*35), 50, 15, "#ffcc00", i >= p.hp);
            
            ctx.fillStyle = (p.jc === 2) ? "#ffcc00" : (p.inv % 10 < 5 ? "#00f2ff" : "rgba(0, 242, 255, 0.2)");
            ctx.fillRect(p.x, p.y, 40, 45);
            
            ctx.fillStyle = "#ff0077"; 
            obs.forEach(o => {
                ctx.fillRect(o.x, o.y, o.w, o.h);
                // 시각적 효과: 장애물 주변에 미세한 네온 광택
                ctx.strokeStyle = "rgba(255, 0, 119, 0.5)";
                ctx.strokeRect(o.x-2, o.y-2, o.w+4, o.h+4);
            });
            items.forEach(it => drawHeart(it.x, it.y, 15, "#ffcc00", false));
            requestAnimationFrame(loop);
        }
        loop();
    };
    </script>
</body>
</html>
