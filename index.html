<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON DASH: RANKING EDITION</title>
    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff0077; --gold: #ffcc00; --bg: #000000; }
        
        body { 
            margin: 0; padding: 0; overflow: hidden; background: #000; 
            font-family: 'Arial Black', sans-serif; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw;
            touch-action: none; -webkit-user-select: none; user-select: none;
        }

        /* 게임 구역 */
        #game-container {
            position: relative;
            width: 100vw; height: 50vw;
            max-width: 900px; max-height: 450px;
            background: #010103;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
        }
        canvas { width: 100%; height: 100%; display: block; }

        /* 하단 스태츠 바 */
        #stat-bar {
            width: 100vw; max-width: 900px; height: 60px;
            background: #080808; border-top: 1px solid #222;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; box-sizing: border-box;
        }
        .label { font-size: 10px; color: #555; display: block; margin-bottom: 2px; }
        .val { color: white; font-size: 20px; font-weight: bold; }
        .fever-wrap { width: 100px; height: 8px; background: #111; border-radius: 4px; overflow: hidden; }
        #fever-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink)); }

        /* 오버레이 및 랭킹 UI */
        .overlay { 
            position: absolute; inset: 0; background: rgba(0, 0, 0, 0.9); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            color: white; z-index: 100; backdrop-filter: blur(8px); 
        }
        
        #rank-box {
            width: 250px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid #222; border-radius: 10px;
            padding: 10px; margin: 15px 0; font-family: 'Arial', sans-serif;
        }
        .rank-item {
            display: flex; justify-content: space-between;
            padding: 5px 0; border-bottom: 1px solid #111; font-size: 13px;
        }
        .rank-item.top { color: var(--gold); font-weight: bold; }

        .btn-start { 
            background: var(--neon-blue); border: none; color: #000; 
            padding: 12px 50px; font-size: 18px; font-weight: 900; 
            border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 20px var(--neon-blue);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="cvs"></canvas>
        <div id="ovl" class="overlay">
            <h1 id="main-msg" style="color:var(--neon-blue); margin:0; font-size: 24px;">NEON RUNNER</h1>
            
            <div id="rank-box">
                <div style="text-align: center; font-size: 10px; color: #555; margin-bottom: 8px;">HALL OF FAME</div>
                <div id="rank-list"></div>
            </div>

            <button class="btn-start" onclick="play()">START</button>
        </div>
    </div>

    <div id="stat-bar">
        <div><span class="label">SCORE</span><span id="score" class="val">0</span></div>
        <div><span class="label">FEVER</span><div class="fever-wrap"><div id="fever-fill"></div></div></div>
        <div style="text-align: right;"><span class="label">ENERGY</span><span id="coins" class="val" style="color:var(--gold);">0%</span></div>
    </div>

<script>
    const cvs = document.getElementById('cvs');
    const ctx = cvs.getContext('2d');
    cvs.width = 900; cvs.height = 450;

    let score = 0, coinGauge = 0, isLive = false, frame = 0;
    let state = { fever: false, fTime: 0, safe: 0 };
    let p = { x: 120, y: 350, dy: 0, g: 0.85, j: -17, jCount: 0 };
    let obs = [], coins = [], trails = [];

    // 사운드 엔진
    const AudioEngine = (() => {
        let audioCtx = null;
        const init = () => { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); };
        const play = (freq, type, dur, vol) => {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        };
        return { init, jump: () => play(250, 'triangle', 0.1, 0.1), coin: () => play(1000, 'sine', 0.05, 0.1), dead: () => play(60, 'square', 0.4, 0.2) };
    })();

    // --- 랭킹 시스템 로직 ---
    function getRanks() {
        const saved = localStorage.getItem('neonRunnerRanks');
        return saved ? JSON.parse(saved) : [0, 0, 0, 0, 0];
    }

    function saveRank(newScore) {
        let ranks = getRanks();
        ranks.push(Math.floor(newScore));
        ranks.sort((a, b) => b - a);
        ranks = ranks.slice(0, 5);
        localStorage.setItem('neonRunnerRanks', JSON.stringify(ranks));
        displayRanks(ranks);
    }

    function displayRanks(ranks = getRanks()) {
        const list = document.getElementById('rank-list');
        list.innerHTML = ranks.map((r, i) => `
            <div class="rank-item ${i === 0 && r > 0 ? 'top' : ''}">
                <span>${i + 1}위</span>
                <span>${r.toLocaleString()} m</span>
            </div>
        `).join('');
    }

    // 초기 실행 시 랭킹 표시
    displayRanks();

    function handleInput(e) {
        if(e && e.cancelable) e.preventDefault();
        if(!isLive) return;
        if(p.jCount < 2) {
            p.dy = p.j; p.jCount++;
            AudioEngine.jump();
        }
    }

    function play() {
        AudioEngine.init();
        score = 0; coinGauge = 0; frame = 0;
        obs = []; coins = []; trails = [];
        p.y = 350; p.dy = 0; p.jCount = 0;
        state.fever = false; state.safe = 0;
        isLive = true;
        document.getElementById('ovl').style.display = 'none';
    }

    function dead() {
        if(!isLive) return;
        isLive = false;
        AudioEngine.dead();
        saveRank(score); // 죽었을 때 랭킹 저장
        setTimeout(() => {
            document.getElementById('main-msg').innerText = "GAME OVER";
            document.getElementById('ovl').style.display = 'flex';
        }, 400);
    }

    function update() {
        if(!isLive) return;
        frame++;
        let worldSpeed = (9 + (score/1200)) * (state.fever ? 2.5 : 1);
        score += worldSpeed / 10;

        p.dy += p.g;
        p.y += p.dy * (state.fever ? 0.7 : 1);
        if(p.y > 350) { p.y = 350; p.dy = 0; p.jCount = 0; }

        if(frame % 2 === 0) trails.push({x: p.x, y: p.y, o: 0.5});
        trails.forEach((t, i) => { t.o -= 0.05; if(t.o <= 0) trails.splice(i, 1); });

        if(state.fever) { state.fTime--; if(state.fTime <= 0) { state.fever = false; state.safe = 100; } }
        if(state.safe > 0) state.safe--;

        if(state.safe <= 0 && !state.fever) {
            let spawnRate = Math.max(30, 80 - Math.floor(score/1000));
            if(frame % spawnRate === 0) {
                let isHigh = Math.random() > 0.5;
                let ox = 950, oy = isHigh ? 210 : 350;
                obs.push({ x: ox, y: oy, s: worldSpeed });
                if(Math.random() > 0.3) {
                    if(isHigh) coins.push({ x: ox, y: 350 });
                    else coins.push({ x: ox, y: 210 });
                }
            }
        }

        obs.forEach((o, i) => {
            o.x -= o.s;
            if(!state.fever && Math.abs(p.x - o.x) < 30 && Math.abs(p.y - o.y) < 35) { dead(); return; }
            if(o.x < -50) obs.splice(i, 1);
        });

        coins.forEach((c, i) => {
            c.x -= worldSpeed;
            if(state.fever) { c.x += (p.x - c.x) * 0.2; c.y += (p.y - c.y) * 0.2; }
            if(Math.abs(p.x - c.x) < 40 && Math.abs(p.y - c.y) < 40) {
                coins.splice(i, 1); AudioEngine.coin();
                if(!state.fever) {
                    coinGauge = Math.min(100, coinGauge + 5);
                    if(coinGauge >= 100) { state.fever = true; state.fTime = 200; coinGauge = 0; }
                }
            }
            if(c.x < -50) coins.splice(i, 1);
        });
        updateUI();
    }

    function draw() {
        ctx.fillStyle = '#010103';
        ctx.fillRect(0,0,900,450);

        ctx.strokeStyle = state.fever ? '#ff0077' : '#00f2ff';
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(0, 395); ctx.lineTo(900, 395); ctx.stroke();

        trails.forEach(t => { ctx.globalAlpha = t.o; ctx.fillStyle = '#00f2ff'; ctx.fillRect(t.x, t.y, 40, 45); });
        ctx.globalAlpha = 1;
        
        ctx.fillStyle = state.fever ? '#fff' : '#00f2ff';
        ctx.fillRect(p.x, p.y, 40, 45);

        ctx.fillStyle = '#ff0077';
        obs.forEach(o => ctx.fillRect(o.x, o.y, 35, 45));

        ctx.fillStyle = '#ffcc00';
        coins.forEach(c => { ctx.beginPath(); ctx.arc(c.x, c.y, 8, 0, 7); ctx.fill(); });
    }

    function updateUI() {
        document.getElementById('score').innerText = Math.floor(score);
        document.getElementById('coins').innerText = Math.floor(coinGauge) + "%";
        document.getElementById('fever-fill').style.width = coinGauge + "%";
    }

    // --- 입력 시스템 ---
    window.addEventListener('touchstart', handleInput, { passive: false });
    window.addEventListener('mousedown', (e) => { if(isLive) handleInput(); });
    window.addEventListener('keydown', (e) => { if(e.code === 'Space') handleInput(); });

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    loop();
</script>
</body>
</html>
