<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON DASH: COOKIE EDITION</title>
    
    <style>
        :root { --neon: #00f2ff; --pink: #ff0077; --gold: #ffcc00; --bg: #050508; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; -webkit-user-select: none; }
        
        body { 
            height: 100vh; background: #000; overflow: hidden; 
            display: flex; flex-direction: column; 
            font-family: 'Apple SD Gothic Neo', sans-serif; color: white;
        }
        
        #game-view { position: relative; flex: 1; width: 100%; display: flex; justify-content: center; align-items: center; background: var(--bg); }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        
        .overlay { 
            position: absolute; inset: 0; background: rgba(0, 0, 0, 0.95); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 1000; padding: 20px;
        }
        
        #title { font-size: 32px; font-weight: 900; color: var(--gold); text-shadow: 0 0 15px var(--gold); margin-bottom: 20px; }
        
        .settings-box { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; width: 100%; max-width: 320px; margin-bottom: 20px; }
        .setting-item { margin-bottom: 15px; text-align: left; }
        .setting-item label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
        input[type="range"] { width: 100%; height: 30px; accent-color: var(--gold); cursor: pointer; }
        .val-display { color: var(--gold); font-size: 14px; font-weight: bold; text-align: right; margin-top: 5px; }

        .btn-start { 
            background: var(--gold); color: #000; padding: 18px 60px; 
            font-size: 20px; font-weight: 900; border-radius: 50px; border: none; cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.4);
        }

        #stat-bar { 
            width: 100%; height: 60px; background: #000; display: flex; 
            justify-content: space-between; align-items: center; padding: 0 25px; border-top: 1px solid #222; 
        }
    </style>
</head>
<body>

    <div id="game-view">
        <canvas id="cvs"></canvas>
        <div id="ovl" class="overlay">
            <div id="title">GOLDEN DASH</div>
            <div class="settings-box">
                <div class="setting-item">
                    <label>엔진 속도 (1 ~ 24)</label>
                    <input type="range" id="speed-slider" min="1" max="24" value="12">
                    <div id="speed-val" class="val-display">현재 속도: 12</div>
                </div>
                <div class="setting-item">
                    <label>장애물 크기 (15 ~ 40)</label>
                    <input type="range" id="size-slider" min="15" max="40" value="20">
                    <div id="size-val" class="val-display">현재 크기: 20px</div>
                </div>
            </div>
            <button class="btn-start" id="start-btn">게임 시작</button>
            <p id="rank-display" style="margin-top:20px; font-size:13px; color:#666;"></p>
        </div>
    </div>

    <div id="stat-bar">
        <div id="score-txt" style="font-weight:900;">SCORE: 0</div>
        <div id="best-txt" style="color:var(--gold); font-weight:bold;">BEST: 0</div>
    </div>

    <script>
    const cvs = document.getElementById('cvs');
    const ctx = cvs.getContext('2d');
    cvs.width = 900; cvs.height = 450;

    const sSpeed = document.getElementById('speed-slider'), sSize = document.getElementById('size-slider');
    const vSpeed = document.getElementById('speed-val'), vSize = document.getElementById('size-val');
    const ovl = document.getElementById('ovl'), startBtn = document.getElementById('start-btn');

    let isLive = false, score = 0, gauge = 0, isFever = false;
    let player = { x: 120, y: 350, dy: 0, g: 1.2, jCount: 0, hp: 3, invul: 0 };
    let obs = [], items = [], config = { speed: 12, size: 20, timer: 0 };

    sSpeed.oninput = () => { vSpeed.innerText = "현재 속도: " + sSpeed.value; };
    sSize.oninput = () => { vSize.innerText = "현재 크기: " + sSize.value + "px"; };

    // 하트 그리기 (색상을 노란색 --gold로 고정)
    function drawHeart(x, y, size, color, empty = false) {
        ctx.save(); ctx.translate(x, y); ctx.beginPath(); ctx.moveTo(0, 0);
        ctx.bezierCurveTo(-size/2, -size/2, -size, size/4, 0, size);
        ctx.bezierCurveTo(size, size/4, size/2, -size/2, 0, 0);
        ctx.fillStyle = empty ? "#222" : color;
        if(!empty) { ctx.shadowBlur = 10; ctx.shadowColor = color; }
        ctx.fill(); ctx.restore();
    }

    function startGame() {
        config.speed = parseInt(sSpeed.value);
        config.size = parseInt(sSize.value);
        player = { x: 120, y: 350, dy: 0, g: 1.2, jCount: 0, hp: 3, invul: 0 };
        obs = []; items = []; score = 0; gauge = 0; isFever = false; isLive = true;
        ovl.style.display = 'none';
    }

    function gameOver() {
        isLive = false;
        let best = localStorage.getItem('neon_best') || 0;
        if(score > best) localStorage.setItem('neon_best', Math.floor(score));
        document.getElementById('rank-display').innerText = "최고 점수: " + (localStorage.getItem('neon_best') || 0);
        ovl.style.display = 'flex';
    }

    const handleAction = (e) => {
        if(!isLive || e.target.closest('.settings-box')) return;
        if(player.jCount < 2) {
            const currentS = (config.speed + (score/2000));
            const jumpForce = -(17 + (currentS * 0.65));
            player.dy = (player.jCount === 0) ? jumpForce : jumpForce * 0.82;
            player.jCount++;
        }
    };

    window.addEventListener('mousedown', handleAction);
    window.addEventListener('touchstart', (e) => { handleAction(e); if(isLive && e.cancelable) e.preventDefault(); }, { passive: false });
    startBtn.onclick = (e) => { e.stopPropagation(); startGame(); };

    function createPattern(type, s) {
        const size = config.size;
        const startX = 950;
        
        if(type === 1) { // 1단 점프 블록 3개 연속
            for(let i=0; i<3; i++) {
                obs.push({ x: startX + (i*180), y: 395-size, w: size, h: size, s: s });
            }
        } else if(type === 2) { // 2단 점프 필수 (긴 블록)
            obs.push({ x: startX, y: 395-size, w: size*3.5, h: size, s: s });
        } else { // 쿠키런 식 '위-아래' 혼합 (높은 장애물 포함)
            obs.push({ x: startX, y: 395-size*2.2, w: size, h: size*2.2, s: s }); // 높은 벽
        }

        // 지능적 아이템 배치 (궤적에 따라)
        for(let i=0; i<5; i++) {
            items.push({ 
                x: startX + (i * 60), 
                y: 260 - (Math.sin(i * 0.8) * 70), 
                type: (Math.random() < 0.05) ? 'heart' : 'coin' 
            });
        }
    }

    function update() {
        if(!isLive) return;
        let s = (config.speed + (score/2500)) * (isFever ? 1.4 : 1);
        player.g = 0.88 + (s * 0.04);
        score += s/8;
        player.dy += player.g; player.y += player.dy;
        if(player.y > 350) { player.y = 350; player.dy = 0; player.jCount = 0; }
        if(player.invul > 0) player.invul--;

        config.timer -= s;
        if(config.timer <= 0) {
            const patternType = Math.floor(Math.random() * 3);
            createPattern(patternType, s);
            config.timer = (400 + Math.random() * 300) * (12/s);
        }

        obs.forEach((o, i) => {
            o.x -= o.s;
            if(!isFever && player.invul <= 0) {
                if(player.x + 8 < o.x + o.w && player.x + 32 > o.x && player.y + 40 > o.y) {
                    player.hp--; player.invul = 60;
                    if(player.hp <= 0) gameOver();
                }
            }
            if(o.x < -400) obs.splice(i, 1);
        });

        items.forEach((it, i) => {
            it.x -= s;
            if(Math.abs(player.x - it.x) < 45 && Math.abs(player.y - it.y) < 60) {
                if(it.type === 'coin') { gauge += 8; if(gauge >= 100) isFever = true; }
                else { if(player.hp < 3) player.hp++; }
                items.splice(i, 1);
            }
            if(it.x < -100) items.splice(i, 1);
        });

        if(isFever) { gauge -= 0.4; if(gauge <= 0) isFever = false; }
        document.getElementById('score-txt').innerText = "SCORE: " + Math.floor(score);
        document.getElementById('best-txt').innerText = "BEST: " + (localStorage.getItem('neon_best') || 0);
    }

    function draw() {
        ctx.fillStyle = "#050508"; ctx.fillRect(0, 0, 900, 450);
        ctx.strokeStyle = isFever ? var(--gold) : "#333";
        ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(0, 395); ctx.lineTo(900, 395); ctx.stroke();

        // 노란색 상단 UI 하트
        for(let i=0; i<3; i++) drawHeart(55 + (i*42), 55, 17, "#ffcc00", i >= player.hp);

        // Player
        if(player.invul % 10 < 5) {
            ctx.fillStyle = isFever ? "#fff" : (player.jCount === 2 ? "#ffcc00" : "#00f2ff");
            ctx.fillRect(player.x, player.y, 40, 45);
        }

        // Obstacles (지능형 패턴)
        ctx.shadowBlur = 12; ctx.shadowColor = "#ff0077";
        ctx.fillStyle = "#ff0077";
        obs.forEach(o => { ctx.fillRect(o.x, o.y, o.w, o.h || config.size); });
        ctx.shadowBlur = 0;

        // 노란색 아이템들
        items.forEach(it => {
            if(it.type === 'coin') {
                ctx.fillStyle = "#ffcc00"; ctx.beginPath(); ctx.arc(it.x, it.y, 8, 0, 7); ctx.fill();
            } else {
                drawHeart(it.x, it.y, 15, "#ffcc00"); // 맵에 나오는 하트도 노란색
            }
        });
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    loop();
    </script>
</body>
</html>
