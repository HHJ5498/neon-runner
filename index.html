<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Runner Long Jump</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7503206245117361" crossorigin="anonymous"></script>

    <style>
        :root { --gold: #ffcc00; --neon: #00f2ff; --pink: #ff0077; --bg: #050508; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; touch-action: none; }
        html, body { height: 100dvh; background: #000; overflow: hidden; font-family: sans-serif; color: white; }
        body { display: flex; flex-direction: column; }

        /* [수정] 레이아웃 최적화: 캔버스 높이를 조절하여 아래쪽 버튼 공간을 무조건 확보 */
        #game-area {
            flex: 1; position: relative; display: flex; justify-content: center; align-items: center;
            background: var(--bg); padding: 5px; overflow: hidden;
        }

        #canvas-box {
            position: relative; width: 100%; max-width: 850px; 
            max-height: 60vh; /* 높이를 더 낮춰서 버튼이 절대 안 잘리게 함 */
            aspect-ratio: 2 / 1;
        }

        canvas { width: 100%; height: 100%; background: #000; border: 2px solid #333; display: block; border-radius: 12px; }

        #ovl {
            position: absolute; inset: 0; background: rgba(0, 0, 0, 0.92);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; padding: 10px;
        }

        #title { font-size: 24px; font-weight: 900; color: var(--gold); margin-bottom: 8px; }

        .rank-list {
            width: 200px; background: rgba(255,255,255,0.05);
            border-radius: 10px; padding: 5px; margin-bottom: 8px; border: 1px solid rgba(255,204,0,0.2);
        }
        .rank-row { display: flex; justify-content: space-between; padding: 2px 8px; font-size: 11px; }

        .controls {
            width: 280px; background: rgba(255,255,255,0.03);
            padding: 10px; border-radius: 12px; margin-bottom: 12px; pointer-events: auto;
        }
        .label-row { display: flex; justify-content: space-between; font-weight: bold; font-size: 11px; margin-bottom: 4px; }
        .badge { background: var(--gold); color: #000; padding: 1px 6px; border-radius: 4px; font-size: 10px; }

        .diff-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .diff-btn { 
            background: #222; border: 1px solid #444; color: #888; padding: 7px 0;
            border-radius: 6px; cursor: pointer; font-size: 12px;
        }
        .diff-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }

        input[type="range"] { width: 100%; height: 5px; accent-color: var(--gold); margin: 8px 0; cursor: pointer; }

        /* [수정] 버튼 위치 및 크기: 눈에 띄게 크게 조정 */
        .btn-start { 
            background: var(--gold); color: #000; padding: 12px 60px; 
            font-size: 20px; font-weight: 900; border-radius: 50px; 
            border: none; cursor: pointer; box-shadow: 0 0 20px rgba(255,204,0,0.5);
        }

        #stat-bar { height: 40px; background: #111; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; font-size: 13px; font-weight: bold; border-top: 1px solid #222; }
        #ad-box { height: 60px; background: #000; display: flex; justify-content: center; align-items: center; border-top: 1px solid #222; }
    </style>
</head>
<body>

    <div id="game-area">
        <div id="canvas-box">
            <canvas id="cvs"></canvas>
            
            <div id="ovl">
                <div id="title">NEON RUNNER</div>
                
                <div class="rank-list">
                    <div class="rank-row"><span>1ST</span><span id="r1">0</span></div>
                    <div class="rank-row"><span>2ND</span><span id="r2">0</span></div>
                    <div class="rank-row"><span>3RD</span><span id="r3">0</span></div>
                </div>

                <div class="controls">
                    <div class="label-row"><span>SPEED (1-18)</span><span id="s-val" class="badge">12</span></div>
                    <input type="range" id="s-input" min="1" max="18" value="12">
                    <div class="label-row"><span>DIFFICULTY</span><span id="d-val" class="badge">2</span></div>
                    <div class="diff-grid">
                        <button class="diff-btn" data-v="1">1</button>
                        <button class="diff-btn active" data-v="2">2</button>
                        <button class="diff-btn" data-v="3">3</button>
                        <button class="diff-btn" data-v="4">4</button>
                        <button class="diff-btn" data-v="5">5</button>
                    </div>
                </div>
                
                <button class="btn-start" id="start-btn">GAME START</button>
            </div>
        </div>
    </div>

    <div id="stat-bar">
        <div id="now-score">SCORE: 0</div>
        <div id="top-score" style="color:var(--gold);">TOP: 0</div>
    </div>

    <div id="ad-box">
        <ins class="adsbygoogle" style="display:block; width:320px; height:50px" data-ad-client="ca-pub-7503206245117361" data-ad-slot="9285335402"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <script>
    window.onload = function() {
        const cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
        cvs.width = 900; cvs.height = 450;

        const ovl = document.getElementById('ovl'), startBtn = document.getElementById('start-btn');
        const sInput = document.getElementById('s-input'), sVal = document.getElementById('s-val');
        const dBtn = document.querySelectorAll('.diff-btn'), dVal = document.getElementById('d-val');

        let isLive = false, score = 0, curLv = 2;
        // [수정] dx: 오른쪽으로 향하는 추진력 추가
        let p = { x: 100, y: 350, dx: 0, dy: 0, jc: 0, hp: 3, inv: 0 };
        let obs = [], cfg = { spd: 12, timer: 0, grav: 2.8 };

        const syncRanks = () => {
            let rs = JSON.parse(localStorage.getItem('nr_final_v3') || "[0,0,0]");
            rs.forEach((v, i) => { if(document.getElementById('r'+(i+1))) document.getElementById('r'+(i+1)).innerText = Math.floor(v); });
            document.getElementById('top-score').innerText = "TOP: " + Math.floor(rs[0]);
        };
        const saveScore = (s) => {
            let rs = JSON.parse(localStorage.getItem('nr_final_v3') || "[0,0,0]");
            rs.push(s); rs.sort((a,b)=>b-a);
            localStorage.setItem('nr_final_v3', JSON.stringify(rs.slice(0,3)));
            syncRanks();
        };
        syncRanks();

        sInput.oninput = () => { sVal.innerText = sInput.value; };
        dBtn.forEach(b => {
            b.onclick = (e) => {
                e.stopPropagation();
                dBtn.forEach(x => x.classList.remove('active'));
                b.classList.add('active');
                curLv = parseInt(b.dataset.v);
                dVal.innerText = curLv;
            };
        });

        startBtn.onclick = function(e) {
            e.stopPropagation();
            cfg.spd = parseInt(sInput.value);
            const gMap = { 1:2.4, 2:2.8, 3:3.2, 4:3.5, 5:4.0 };
            cfg.grav = gMap[curLv];
            p = { x: 100, y: 350, dx: 0, dy: 0, jc: 0, hp: 3, inv: 0 };
            obs = []; score = 0; isLive = true;
            ovl.style.display = 'none';
        };

        // [수정] 오른쪽으로 넓게 뛰는 점프 로직 (포물선)
        const handleJump = (e) => {
            if(!isLive || e.target.closest('.controls') || e.target === startBtn) return;
            
            if(p.jc < 2) {
                p.dy = (p.jc === 0) ? -32 : -26; // 초고공 수직 점프
                p.dx = 6; // 오른쪽으로 밀어주는 힘 (폭이 넓어짐)
                p.jc++;
            }
        };

        window.addEventListener('mousedown', handleJump);
        window.addEventListener('touchstart', (e) => {
            if(isLive && !e.target.closest('#ovl')) e.preventDefault();
            handleJump(e);
        }, { passive: false });

        function loop() {
            if(isLive) {
                let s = cfg.spd + (score/3000); 
                p.dy += cfg.grav;
                p.y += p.dy;
                p.x += p.dx; // 오른쪽 이동 적용

                // 공기 저항 (오른쪽으로 계속 가지 않게 서서히 줄어듦)
                p.dx *= 0.98;

                // 바닥 도착 시 초기화
                if(p.y >= 350) { 
                    p.y = 350; p.dy = 0; p.jc = 0; 
                    p.x = 100; // 제자리 복귀 (또는 서서히 복귀)
                    p.dx = 0;
                }

                if(p.inv > 0) p.inv--;
                score += s/12; cfg.timer -= s;

                if(cfg.timer <= 0) {
                    let h = Math.random() > 0.5 ? 25 : 55;
                    obs.push({ x: 950, y: 400-h, w: 25, h: h, s: s });
                    cfg.timer = (450 + Math.random() * 550) * (15/s);
                }

                obs.forEach((o, i) => {
                    o.x -= o.s;
                    // 판정 완화
                    if(p.inv <= 0 && p.x+10 < o.x+o.w && p.x+30 > o.x && p.y+10 < o.y+o.h && p.y+40 > o.y) {
                        p.hp--; p.inv = 60;
                        if(p.hp <= 0) { isLive = false; saveScore(score); ovl.style.display = 'flex'; }
                    }
                    if(o.x < -100) obs.splice(i, 1);
                });
                document.getElementById('now-score').innerText = "SCORE: " + Math.floor(score);
            }

            ctx.fillStyle = "#050508"; ctx.fillRect(0, 0, 900, 450);
            ctx.strokeStyle = "#444"; ctx.lineWidth = 1; ctx.strokeRect(0, 400, 900, 1);
            
            // HP 바
            ctx.fillStyle = "#ffcc00";
            for(let i=0; i<p.hp; i++) ctx.fillRect(30+(i*25), 30, 15, 15);
            
            // 캐릭터 (2단 점프 시 황금색)
            ctx.fillStyle = (p.jc === 2) ? "#ffcc00" : (p.inv % 10 < 5 ? "#00f2ff" : "rgba(0,242,255,0.2)");
            ctx.fillRect(p.x, p.y, 40, 50);
            
            ctx.fillStyle = "#ff0077"; 
            obs.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));
            
            requestAnimationFrame(loop);
        }
        loop();
    };
    </script>
</body>
</html>
