<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Runner : 동체시력키우기</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7503206245117361" crossorigin="anonymous"></script>

    <style>
        :root { --gold: #ffcc00; --neon: #00f2ff; --pink: #ff0077; --bg: #050508; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; touch-action: none; -webkit-touch-callout: none; }
        
        html, body { 
            height: 100%; width: 100%; 
            background: #000; overflow: hidden; 
            font-family: sans-serif; color: white; 
        }
        body { display: flex; flex-direction: column; }

        #game-area {
            flex: 1; position: relative; display: flex; justify-content: center; align-items: flex-start;
            background: var(--bg); padding: 10px; overflow: hidden;
        }

        #canvas-box {
            position: relative; width: 100%; max-width: 600px; 
            max-height: 45vh; aspect-ratio: 2 / 1; margin-top: 20px;
        }

        canvas { 
            width: 100%; height: 100%; background: #000; 
            border: 2px solid #333; display: block; border-radius: 12px; 
        }

        #ovl {
            position: absolute; inset: 0; background: rgba(0, 0, 0, 0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; padding: 20px; border-radius: 12px;
        }

        #title { 
            font-size: 26px; font-weight: 900; color: var(--gold); 
            margin-bottom: 5px; letter-spacing: 1px; text-shadow: 0 0 15px var(--gold);
            text-align: center;
        }
        #sub-title { font-size: 14px; color: var(--neon); margin-bottom: 25px; font-weight: bold; }

        .btn-start { 
            background: var(--gold); color: #000; padding: 18px 70px; 
            font-size: 24px; font-weight: 900; border-radius: 50px; border: none; cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 204, 0, 0.4);
        }

        #stat-bar { 
            height: 50px; background: #111; display: flex; 
            justify-content: space-between; align-items: center; 
            padding: 0 30px; font-size: 14px; font-weight: bold; border-top: 1px solid #222; 
        }
        
        #ad-box { height: 75px; background: #000; display: flex; justify-content: center; align-items: center; border-top: 1px solid #222; }
        
        .ai-stat { font-size: 11px; color: #666; font-family: monospace; }
    </style>
</head>
<body oncontextmenu="return false;" ondragstart="return false;">

    <div id="game-area">
        <div id="canvas-box">
            <canvas id="cvs"></canvas>
            <div id="ovl">
                <div id="title">Neon Runner : 동체시력키우기</div>
                <div id="sub-title">AI ADAPTIVE PHYSICS ENGINE</div>
                <button class="btn-start" id="start-btn">START</button>
            </div>
        </div>
    </div>

    <div id="stat-bar">
        <div id="now-score">SCORE: 0</div>
        <div class="ai-stat" id="ai-log">GRAVITY: 3.2 | SPEED: 10.0</div>
        <div id="top-score" style="color:var(--gold);">TOP: 0</div>
    </div>

    <div id="ad-box">
        <ins class="adsbygoogle"
             style="display:block; width:320px; height:50px"
             data-ad-client="ca-pub-7503206245117361"
             data-ad-slot="9285335402"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <script>
    window.onload = function() {
        const cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
        cvs.width = 900; cvs.height = 450;
        const ovl = document.getElementById('ovl'), startBtn = document.getElementById('start-btn'), aiLog = document.getElementById('ai-log');

        let isLive = false, score = 0;
        let p = { x: 100, y: 350, dy: 0, jc: 0, hp: 3, inv: 0, isJumping: false, jumpTime: 0 };
        let obs = [], cfg = { spd: 10, nextDist: 0, grav: 3.2, gap: 650, jumpForce: -20, holdForce: -3.8 }; 

        const syncTop = () => {
            let top = localStorage.getItem('neon_runner_ai_top') || 0;
            document.getElementById('top-score').innerText = "TOP: " + Math.floor(top);
        };
        const saveTop = (s) => {
            let top = localStorage.getItem('neon_runner_ai_top') || 0;
            if(s > top) localStorage.setItem('neon_runner_ai_top', s);
            syncTop();
        };
        syncTop();

        startBtn.onclick = function(e) {
            e.stopPropagation();
            cfg = { spd: 10, nextDist: 0, grav: 3.2, gap: 650, jumpForce: -20, holdForce: -3.8 };
            p = { x: 100, y: 350, dy: 0, jc: 0, hp: 3, inv: 0, isJumping: false, jumpTime: 0 };
            obs = []; score = 0; isLive = true;
            ovl.style.display = 'none';
        };

        const startJump = (e) => {
            if(!isLive || e.target === startBtn) return;
            if (e.pointerType === 'mouse' && e.button !== 0) return;
            if (e.pointerType === 'touch') e.preventDefault();
            if(p.jc < 2) {
                p.dy = (p.jc === 0) ? cfg.jumpForce : cfg.jumpForce * 0.9;
                p.jc++; p.isJumping = true; p.jumpTime = 0;
            }
        };
        const endJump = () => p.isJumping = false;

        window.addEventListener('pointerdown', startJump, { passive: false });
        window.addEventListener('pointerup', endJump);

        function loop() {
            if(isLive) {
                // AI 물리 엔진 적용
                cfg.spd += 0.0018; 
                cfg.grav = 3.2 + (score / 1500);
                cfg.jumpForce = -20 - (cfg.grav - 3.2) * 1.5;
                cfg.holdForce = -3.8 - (cfg.grav - 3.2) * 0.4;
                cfg.gap = Math.max(270, 680 - (cfg.spd - 10) * 28);
                
                aiLog.innerText = `GRAVITY: ${cfg.grav.toFixed(2)} | SPEED: ${cfg.spd.toFixed(1)} | JUMP: ${Math.abs(cfg.jumpForce).toFixed(1)}`;

                if (p.isJumping && p.jumpTime < 18) {
                    p.dy += cfg.holdForce; p.jumpTime++;
                } else { p.isJumping = false; }

                p.dy += cfg.grav; p.y += p.dy;
                if(p.y >= 350) { p.y = 350; p.dy = 0; p.jc = 0; p.isJumping = false; }
                
                if(p.inv > 0) p.inv--;
                score += cfg.spd / 12;
                cfg.nextDist -= cfg.spd;

                if(cfg.nextDist <= 0) {
                    let h = Math.random() > 0.65 ? 35 : 75; 
                    obs.push({ x: 950, y: 400-h, w: 32, h: h });
                    cfg.nextDist = cfg.gap; 
                }

                obs.forEach((o, i) => {
                    o.x -= cfg.spd;
                    if(p.inv <= 0 && p.x+15 < o.x+o.w && p.x+25 > o.x && p.y+10 < o.y+o.h && p.y+40 > o.y) {
                        p.hp--; p.inv = 60;
                        if(p.hp <= 0) { isLive = false; saveTop(score); ovl.style.display = 'flex'; }
                    }
                    if(o.x < -100) obs.splice(i, 1);
                });
                document.getElementById('now-score').innerText = "SCORE: " + Math.floor(score);
            }

            ctx.fillStyle = "#050508"; ctx.fillRect(0, 0, 900, 450);
            ctx.strokeStyle = "#333"; ctx.lineWidth = 2; ctx.strokeRect(0, 400, 900, 1);
            
            ctx.fillStyle = "#ffcc00";
            for(let i=0; i<p.hp; i++) ctx.fillRect(40+(i*25), 40, 15, 15);
            
            ctx.fillStyle = (p.jc === 2) ? "#ffcc00" : (p.inv % 10 < 5 ? "#00f2ff" : "rgba(0,242,255,0.2)");
            ctx.fillRect(p.x, p.y, 40, 50);
            
            ctx.fillStyle = "#ff0077"; 
            obs.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));
            
            requestAnimationFrame(loop);
        }
        loop();
    };
    </script>
</body>
</html>
