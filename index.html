<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Runner</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7503206245117361" crossorigin="anonymous"></script>

    <style>
        :root { --gold: #ffcc00; --neon: #00f2ff; --pink: #ff0077; --bg: #050508; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; -webkit-user-select: none; }
        body { height: 100vh; background: #000; overflow: hidden; display: flex; flex-direction: column; font-family: sans-serif; color: white; }
        
        /* [레이아웃 핵심 패치] 캔버스 해상도 고정 및 object-fit Contain */
        #game-view { position: relative; flex: 1; width: 100%; background: var(--bg); display: flex; justify-content: center; align-items: center; overflow: hidden; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        
        /* 메뉴 레이어 */
        .overlay { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; padding: 20px; }
        #title { font-size: 42px; font-weight: 900; color: var(--gold); text-shadow: 0 0 20px var(--gold); margin-bottom: 10px; }
        
        /* 랭킹 표시부 추가 */
        .rank-display { margin-bottom: 20px; text-align: center; }
        .rank-label { font-size: 14px; color: #aaa; letter-spacing: 2px; }
        .rank-value { font-size: 28px; font-weight: 900; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.5); }

        .settings-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; border: 1px solid #333; width: 100%; max-width: 340px; margin-bottom: 15px; pointer-events: auto; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .val-badge { background: var(--gold); color: #000; padding: 2px 10px; border-radius: 5px; font-weight: 900; font-size: 13px; }
        
        .difficulty-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 10px; }
        .diff-btn { background: #222; border: 1px solid #444; color: #888; padding: 12px 0; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .diff-btn.active { background: var(--gold); border-color: var(--gold); color: #000; box-shadow: 0 0 15px rgba(255,204,0,0.4); }

        input[type="range"] { width: 100%; height: 10px; accent-color: var(--gold); cursor: pointer; margin: 10px 0 15px; }
        .btn-start { background: var(--gold); color: #000; padding: 18px 70px; font-size: 22px; font-weight: 900; border-radius: 50px; border: none; cursor: pointer; pointer-events: auto; transition: 0.2s; }
        .btn-start:active { transform: scale(0.95); }

        /* 하단 정보바 및 광고 */
        #stat-bar { width: 100%; height: 50px; background: #000; display: flex; justify-content: space-between; align-items: center; padding: 0 25px; border-top: 1px solid #222; }
        #ad-bottom { width: 100%; height: 65px; background: #000; display: flex; justify-content: center; align-items: center; overflow: hidden; border-top: 1px solid #222; }
    </style>
</head>
<body>

    <div id="game-view">
        <canvas id="cvs"></canvas>
        <div id="ovl" class="overlay">
            <div id="title">Neon Runner</div>
            
            <div class="rank-display">
                <div class="rank-label">TOP SCORE</div>
                <div id="menu-best" class="rank-value">0</div>
            </div>

            <div class="settings-box">
                <div class="setting-row"><span>기본 속도</span><span id="speed-val" class="val-badge">12</span></div>
                <input type="range" id="speed-slider" min="1" max="24" value="12">
                <div class="setting-row"><span>난이도 (LEVEL)</span><span id="diff-label" class="val-badge">2</span></div>
                <div class="difficulty-grid" id="diff-selector">
                    <button class="diff-btn" data-level="1">1</button>
                    <button class="diff-btn active" data-level="2">2</button>
                    <button class="diff-btn" data-level="3">3</button>
                    <button class="diff-btn" data-level="4">4</button>
                    <button class="diff-btn" data-level="5">5</button>
                </div>
            </div>
            <button class="btn-start" id="start-btn">GAME START</button>
        </div>
    </div>

    <div id="stat-bar">
        <div id="score-txt" style="font-weight:900;">SCORE: 0</div>
        <div id="best-txt" style="color:var(--gold); font-weight:bold;">BEST: 0</div>
    </div>

    <div id="ad-bottom">
        <ins class="adsbygoogle"
             style="display:block; width:320px; height:50px"
             data-ad-client="ca-pub-7503206245117361"
             data-ad-slot="9285335402"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <script>
    window.onload = function() {
        const cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
        
        // 캔버스 내부 해상도 고정
        cvs.width = 900;
        cvs.height = 450;
        
        const sSpeed = document.getElementById('speed-slider'), vSpeed = document.getElementById('speed-val');
        const ovl = document.getElementById('ovl'), startBtn = document.getElementById('start-btn');
        const diffBtns = document.querySelectorAll('.diff-btn'), diffLabel = document.getElementById('diff-label');
        const menuBest = document.getElementById('menu-best');

        let isLive = false, score = 0, currentDiff = 2, player = { x: 120, y: 350, dy: 0, jCount: 0, hp: 3, invul: 0 };
        let obs = [], items = [], config = { speed: 12, size: 20, timer: 0, gravity: 0.9 };

        const diffSettings = {
            1: { speedMult: 0.8, spawnMult: 1.3, gravity: 2.4 },
            2: { speedMult: 1.0, spawnMult: 1.0, gravity: 2.6 },
            3: { speedMult: 1.3, spawnMult: 0.8, gravity: 2.8 },
            4: { speedMult: 1.6, spawnMult: 0.7, gravity: 3.0 },
            5: { speedMult: 2.0, spawnMult: 0.5, gravity: 3.2 }
        };

        // 최고 기록 업데이트 함수
        const updateBest = () => {
            const best = localStorage.getItem('nr_best') || 0;
            menuBest.innerText = Math.floor(best);
            document.getElementById('best-txt').innerText = "BEST: " + Math.floor(best);
        };
        updateBest();

        sSpeed.oninput = () => { vSpeed.innerText = sSpeed.value; };
        diffBtns.forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                diffBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentDiff = parseInt(btn.dataset.level);
                diffLabel.innerText = currentDiff;
            };
        });

        function drawHeart(x, y, size, color, empty = false) {
            ctx.save(); ctx.translate(x, y); ctx.beginPath(); ctx.moveTo(0, 0);
            ctx.bezierCurveTo(-size/2, -size/2, -size, size/4, 0, size);
            ctx.bezierCurveTo(size, size/4, size/2, -size/2, 0, 0);
            ctx.fillStyle = empty ? "#222" : color;
            if(!empty) { ctx.shadowBlur = 10; ctx.shadowColor = color; }
            ctx.fill(); ctx.restore();
        }

        const jump = (e) => {
            if(!isLive || e.target.closest('.settings-box') || e.target === startBtn) return;
            if(player.jCount < 2) {
                const s = (config.speed + (score/2000)) * 0.1;
                player.dy = (player.jCount === 0) ? -(24 + s) : -(18 + s);
                player.jCount++;
            }
        };

        window.addEventListener('touchstart', (e) => { jump(e); if(isLive) e.preventDefault(); }, { passive: false });
        window.addEventListener('mousedown', jump);
        
        startBtn.onclick = (e) => {
            e.stopPropagation();
            const d = diffSettings[currentDiff];
            config.speed = parseInt(sSpeed.value) * d.speedMult;
            config.gravity = d.gravity;
            player = { x: 120, y: 350, dy: 0, jCount: 0, hp: 3, invul: 0 };
            obs = []; items = []; score = 0; isLive = true;
            ovl.style.display = 'none';
        };

        function update() {
            if(!isLive) return;
            const d = diffSettings[currentDiff];
            let s = config.speed + (score/2000);
            player.dy += config.gravity; 
            player.y += player.dy;
            if(player.y > 350) { player.y = 350; player.dy = 0; player.jCount = 0; }
            if(player.invul > 0) player.invul--;
            score += (s/10) * currentDiff; 
            config.timer -= s;
            if(config.timer <= 0) { 
                const startX = 950;
                obs.push({ x: startX, y: 395-20, w: 20, h: 20, s: s });
                if(Math.random() < 0.3) items.push({ x: startX + 100, y: 220, type: 'heart' });
                config.timer = (450 + Math.random() * 300) * (12/s) * d.spawnMult; 
            }
            obs.forEach((o, i) => { o.x -= o.s; if(player.invul <= 0 && player.x + 5 < o.x + o.w && player.x + 30 > o.x && player.y + 40 > o.y) { player.hp--; player.invul = 60; if(player.hp <= 0) { isLive = false; const best = localStorage.getItem('nr_best') || 0; if(score > best) localStorage.setItem('nr_best', score); updateBest(); ovl.style.display = 'flex'; } } if(o.x < -100) obs.splice(i, 1); });
            items.forEach((it, i) => { it.x -= s; if(Math.abs(player.x - it.x) < 45 && Math.abs(player.y - it.y) < 60) { if(it.type === 'heart' && player.hp < 3) player.hp++; items.splice(i, 1); } });
            document.getElementById('score-txt').innerText = "SCORE: " + Math.floor(score);
        }

        function draw() {
            ctx.fillStyle = "#050508"; ctx.fillRect(0, 0, 900, 450);
            ctx.strokeStyle = "#222"; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(0, 395); ctx.lineTo(900, 395); ctx.stroke();
            for(let i=0; i<3; i++) drawHeart(55 + (i*42), 55, 17, "#ffcc00", i >= player.hp);
            if(player.invul % 10 < 5) { ctx.fillStyle = player.jCount === 2 ? "#ffcc00" : "#00f2ff"; ctx.shadowBlur = 10; ctx.shadowColor = ctx.fillStyle; ctx.fillRect(player.x, player.y, 40, 45); ctx.shadowBlur = 0; }
            ctx.fillStyle = "#ff0077"; ctx.shadowBlur = 8; ctx.shadowColor = "#ff0077"; obs.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h)); ctx.shadowBlur = 0;
            items.forEach(it => { if(it.type === 'heart') drawHeart(it.x, it.y, 15, "#ffcc00"); });
        }
        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    };
    </script>
</body>
</html>
