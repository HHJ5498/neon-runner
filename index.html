<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Runner Pro Ad-Ready</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7503206245117361" crossorigin="anonymous"></script>

    <style>
        :root { --gold: #ffcc00; --neon: #00f2ff; --pink: #ff0077; --bg: #050508; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; touch-action: none; }
        html, body { height: 100%; width: 100%; background: #000; overflow: hidden; font-family: sans-serif; color: white; }
        body { display: flex; flex-direction: column; }

        /* 모바일 최적화 비율 45vh */
        #game-area {
            flex: 1; position: relative; display: flex; justify-content: center; align-items: flex-start;
            background: var(--bg); padding: 5px; overflow: hidden;
        }

        #canvas-box {
            position: relative; width: 100%; max-width: 600px; 
            max-height: 45vh; 
            aspect-ratio: 2 / 1;
            margin-top: 15px;
        }

        canvas { width: 100%; height: 100%; background: #000; border: 2px solid #444; display: block; border-radius: 8px; }

        #ovl {
            position: absolute; inset: 0; background: rgba(0, 0, 0, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; padding: 10px;
        }

        #title { font-size: 22px; font-weight: 900; color: var(--gold); margin-bottom: 5px; }

        .controls {
            width: 100%; max-width: 260px; background: rgba(255,255,255,0.05);
            padding: 10px; border-radius: 12px; margin-bottom: 10px;
        }
        .label-row { display: flex; justify-content: space-between; font-weight: bold; font-size: 11px; margin-bottom: 3px; }
        .badge { background: var(--gold); color: #000; padding: 1px 5px; border-radius: 3px; font-size: 10px; }

        input[type="range"] { width: 100%; height: 4px; accent-color: var(--gold); margin: 5px 0 10px; }

        .diff-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .diff-btn { background: #222; border: 1px solid #444; color: #888; padding: 10px 0; border-radius: 5px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .diff-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }

        .btn-start { 
            background: var(--gold); color: #000; padding: 14px 50px; 
            font-size: 18px; font-weight: 900; border-radius: 40px; border: none; cursor: pointer;
        }

        #stat-bar { height: 40px; background: #111; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; font-size: 12px; font-weight: bold; }
        
        /* 광고 영역 스타일 */
        #ad-container { 
            height: 60px; 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            border-top: 1px solid #222;
        }
    </style>
</head>
<body>

    <div id="game-area">
        <div id="canvas-box">
            <canvas id="cvs"></canvas>
            <div id="ovl">
                <div id="title">NEON RUNNER</div>
                <div class="controls">
                    <div class="label-row"><span>BASE SPEED</span><span id="s-val" class="badge">12</span></div>
                    <input type="range" id="s-input" min="1" max="18" value="12">
                    <div class="label-row"><span>DIFFICULTY (1-5)</span><span id="d-val" class="badge">2</span></div>
                    <div class="diff-grid">
                        <button class="diff-btn" data-v="1">1</button>
                        <button class="diff-btn active" data-v="2">2</button>
                        <button class="diff-btn" data-v="3">3</button>
                        <button class="diff-btn" data-v="4">4</button>
                        <button class="diff-btn" data-v="5">5</button>
                    </div>
                </div>
                <button class="btn-start" id="start-btn">GAME START</button>
            </div>
        </div>
    </div>

    <div id="stat-bar">
        <div id="now-score">SCORE: 0</div>
        <div id="top-score" style="color:var(--gold);">TOP: 0</div>
    </div>

    <div id="ad-container">
        <ins class="adsbygoogle"
             style="display:block; width:320px; height:50px"
             data-ad-client="ca-pub-7503206245117361"
             data-ad-slot="9285335402"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

    <script>
    // [자바스크립트 로직은 위에서 드린 꾹 누르기 최신 버전과 동일합니다]
    window.onload = function() {
        const cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
        cvs.width = 900; cvs.height = 450;
        const ovl = document.getElementById('ovl'), startBtn = document.getElementById('start-btn');
        const sInput = document.getElementById('s-input'), sVal = document.getElementById('s-val');
        const dBtn = document.querySelectorAll('.diff-btn');

        let isLive = false, score = 0, curLv = 2;
        let p = { x: 100, y: 350, dy: 0, jc: 0, hp: 3, inv: 0, isJumping: false, jumpTime: 0 };
        let obs = [], cfg = { spd: 12, timer: 0, grav: 3.8 };

        const JUMP_PARAMS = { baseForce: -16, holdForce: -2.3, maxHoldTime: 12 };

        sInput.oninput = () => { sVal.innerText = sInput.value; };
        dBtn.forEach(b => {
            b.onclick = (e) => {
                e.stopPropagation();
                dBtn.forEach(x => x.classList.remove('active'));
                b.classList.add('active');
                curLv = parseInt(b.dataset.v);
                document.getElementById('d-val').innerText = curLv;
            };
        });

        startBtn.onclick = function(e) {
            e.stopPropagation();
            const baseSpd = parseInt(sInput.value);
            const lvMap = {
                1: { grav: 3.2, spdMul: 0.7, fMin: 500, fMax: 800 },
                2: { grav: 3.8, spdMul: 1.0, fMin: 300, fMax: 600 },
                3: { grav: 4.1, spdMul: 1.2, fMin: 200, fMax: 450 },
                4: { grav: 4.4, spdMul: 1.4, fMin: 150, fMax: 300 },
                5: { grav: 4.8, spdMul: 1.7, fMin: 80,  fMax: 180 }
            };
            const s = lvMap[curLv];
            cfg.spd = baseSpd * s.spdMul; cfg.grav = s.grav; cfg.freqMin = s.fMin; cfg.freqMax = s.fMax;
            p = { x: 100, y: 350, dy: 0, jc: 0, hp: 3, inv: 0, isJumping: false, jumpTime: 0 };
            obs = []; score = 0; isLive = true; cfg.timer = 0;
            ovl.style.display = 'none';
        };

        const startJump = (e) => {
            if(!isLive || e.target.closest('.controls')) return;
            if(p.jc < 2) {
                p.dy = (p.jc === 0) ? JUMP_PARAMS.baseForce : JUMP_PARAMS.baseForce * 0.85;
                p.jc++; p.isJumping = true; p.jumpTime = 0;
            }
        };
        const endJump = () => p.isJumping = false;

        window.addEventListener('mousedown', startJump);
        window.addEventListener('mouseup', endJump);
        window.addEventListener('touchstart', (e) => {
            if(isLive && !e.target.closest('#ovl')) e.preventDefault();
            startJump(e);
        }, { passive: false });
        window.addEventListener('touchend', endJump);

        function drawHeart(x, y, s, col, empty) {
            ctx.save(); ctx.translate(x, y); ctx.beginPath();
            ctx.bezierCurveTo(-s/2,-s/2,-s,s/4,0,s); ctx.bezierCurveTo(s,s/4,s/2,-s/2,0,0);
            ctx.fillStyle = empty ? "#222" : col; ctx.fill(); ctx.restore();
        }

        function loop() {
            if(isLive) {
                let s = cfg.spd + (score / (2000 / curLv)); 
                if (p.isJumping && p.jumpTime < JUMP_PARAMS.maxJumpHoldTime) {
                    p.dy += JUMP_PARAMS.holdForce; p.jumpTime++;
                } else { p.isJumping = false; }
                p.dy += cfg.grav; p.y += p.dy;
                if(p.y >= 350) { p.y = 350; p.dy = 0; p.jc = 0; p.isJumping = false; }
                if(p.inv > 0) p.inv--;
                score += s/6; cfg.timer -= s;
                if(cfg.timer <= 0) {
                    let h = Math.random() > 0.5 ? 30 : 70; 
                    obs.push({ x: 950, y: 400-h, w: 35, h: h, s: s });
                    cfg.timer = (cfg.freqMin + Math.random() * (cfg.freqMax - cfg.freqMin)) * (15/s);
                }
                obs.forEach((o, i) => {
                    o.x -= o.s;
                    if(p.inv <= 0 && p.x+15 < o.x+o.w && p.x+25 > o.x && p.y+10 < o.y+o.h && p.y+40 > o.y) {
                        p.hp--; p.inv = 60;
                        if(p.hp <= 0) { isLive = false; ovl.style.display = 'flex'; }
                    }
                    if(o.x < -100) obs.splice(i, 1);
                });
                document.getElementById('now-score').innerText = "SCORE: " + Math.floor(score);
            }
            ctx.fillStyle = "#050508"; ctx.fillRect(0, 0, 900, 450);
            ctx.strokeStyle = "#444"; ctx.lineWidth = 1; ctx.strokeRect(0, 400, 900, 1);
            for(let i=0; i<3; i++) drawHeart(40+(i*30), 40, 12, "#ffcc00", i >= p.hp);
            ctx.fillStyle = (p.jc === 2) ? "#ffcc00" : (p.inv % 10 < 5 ? "#00f2ff" : "rgba(0,242,255,0.2)");
            ctx.fillRect(p.x, p.y, 40, 50);
            ctx.fillStyle = "#ff0077"; obs.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));
            requestAnimationFrame(loop);
        }
        loop();
    };
    </script>
</body>
</html>
