<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Runner</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7503206245117361" crossorigin="anonymous"></script>

    <style>
        :root { --gold: #ffcc00; --neon: #00f2ff; --pink: #ff0077; --bg: #050508; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; -webkit-user-select: none; }
        
        body { 
            height: 100dvh; /* 기기 높이에 딱 맞춤 */
            background: #000; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            font-family: -apple-system, sans-serif;
        }

        /* [핵심] 게임이 담기는 컨테이너 - 남는 공간을 모두 차지함 */
        #game-wrapper { 
            flex: 1; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            position: relative;
            background: var(--bg);
            padding: 10px;
        }

        /* [핵심] 캔버스 가변 비율 조절 - 절대 화면을 넘지 않음 */
        #canvas-container {
            position: relative;
            width: 100%;
            max-width: 900px; /* PC 최대 크기 */
            aspect-ratio: 2 / 1; /* 게임의 900:450 비율 강제 고정 */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas { 
            width: 100%; 
            height: 100%; 
            background: #000;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            border: 1px solid #222;
        }

        /* 랭킹 및 메뉴 레이어 - 캔버스 크기에 딱 맞게 겹침 */
        .overlay { 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100;
        }

        #title { font-size: clamp(24px, 6vw, 42px); font-weight: 900; color: var(--gold); text-shadow: 0 0 15px var(--gold); margin-bottom: 5px; }
        
        .rank-box { margin-bottom: 15px; text-align: center; }
        .rank-val { font-size: clamp(28px, 7vw, 40px); font-weight: 900; color: #fff; }

        .settings { 
            background: rgba(255,255,255,0.05); padding: 10px; border-radius: 15px; 
            width: 80%; max-width: 320px; margin-bottom: 15px;
        }
        .row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; font-weight: bold; color: #aaa; }
        .tag { background: var(--gold); color: #000; padding: 1px 6px; border-radius: 4px; font-size: 11px; }

        .diff-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 5px; }
        .diff-btn { background: #222; border: 1px solid #444; color: #888; padding: 8px 0; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .diff-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }

        input[type="range"] { width: 100%; accent-color: var(--gold); margin: 8px 0; }
        .btn-start { background: var(--gold); color: #000; padding: 12px 50px; font-size: 20px; font-weight: 900; border-radius: 50px; border: none; cursor: pointer; }

        /* 하단 점수바 */
        #stat-bar { 
            height: 40px; background: #000; display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px; font-size: 14px; font-weight: bold; color: white; border-top: 1px solid #222;
        }

        /* 광고 영역 고정 */
        #ad-box { 
            height: 60px; background: #000; display: flex; justify-content: center; align-items: center; 
            border-top: 1px solid #222; overflow: hidden;
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="canvas-container">
            <canvas id="cvs"></canvas>
            <div id="ovl" class="overlay">
                <div id="title">NEON RUNNER</div>
                <div class="rank-box">
                    <div style="font-size:12px; color:var(--gold); letter-spacing:2px;">TOP SCORE</div>
                    <div id="menu-best" class="rank-val">0</div>
                </div>
                <div class="settings">
                    <div class="row"><span>SPEED</span><span id="sv" class="tag">12</span></div>
                    <input type="range" id="ss" min="1" max="24" value="12">
                    <div class="row"><span>LEVEL</span><span id="lv" class="tag">2</span></div>
                    <div class="diff-grid" id="db">
                        <button class="diff-btn" data-l="1">1</button>
                        <button class="diff-btn active" data-l="2">2</button>
                        <button class="diff-btn" data-l="3">3</button>
                        <button class="diff-btn" data-l="4">4</button>
                        <button class="diff-btn" data-l="5">5</button>
                    </div>
                </div>
                <button class="btn-start" id="sb">START</button>
            </div>
        </div>
    </div>

    <div id="stat-bar">
        <div id="st">SCORE: 0</div>
        <div id="bt" style="color:var(--gold);">BEST: 0</div>
    </div>

    <div id="ad-box">
        <ins class="adsbygoogle"
             style="display:block; width:320px; height:50px"
             data-ad-client="ca-pub-7503206245117361"
             data-ad-slot="9285335402"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <script>
    window.onload = function() {
        const cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
        cvs.width = 900; cvs.height = 450;
        
        const ovl = document.getElementById('ovl'), sb = document.getElementById('sb');
        const ss = document.getElementById('ss'), sv = document.getElementById('sv');
        const db = document.querySelectorAll('.diff-btn'), lv = document.getElementById('lv');
        const mb = document.getElementById('menu-best');

        let live = false, score = 0, diff = 2;
        let p = { x: 120, y: 350, dy: 0, jc: 0, hp: 3, inv: 0 };
        let obs = [], items = [], cfg = { spd: 12, timer: 0, grav: 2.6 };

        const lvSet = {
            1: { sm: 0.8, g: 2.4 }, 2: { sm: 1.0, g: 2.6 }, 3: { sm: 1.3, g: 2.8 },
            4: { sm: 1.6, g: 3.0 }, 5: { sm: 2.0, g: 3.2 }
        };

        const updateRecord = () => {
            const b = Math.floor(localStorage.getItem('nr_best_v3') || 0);
            mb.innerText = b;
            document.getElementById('bt').innerText = "BEST: " + b;
        };
        updateRecord();

        ss.oninput = () => { sv.innerText = ss.value; };
        db.forEach(b => {
            b.onclick = () => {
                db.forEach(x => x.classList.remove('active'));
                b.classList.add('active');
                diff = parseInt(b.dataset.l);
                lv.innerText = diff;
            };
        });

        const doJump = (e) => {
            if(!live || e.target.closest('.settings') || e.target === sb) return;
            if(p.jc < 2) {
                p.dy = (p.jc === 0) ? -25 : -20;
                p.jc++;
            }
        };

        window.addEventListener('touchstart', (e) => { if(live) e.preventDefault(); doJump(e); }, { passive: false });
        window.addEventListener('mousedown', doJump);
        
        sb.onclick = () => {
            const l = lvSet[diff];
            cfg.spd = parseInt(ss.value) * l.sm;
            cfg.grav = l.g;
            p = { x: 120, y: 350, dy: 0, jc: 0, hp: 3, inv: 0 };
            obs = []; items = []; score = 0; live = true;
            ovl.style.display = 'none';
        };

        function drawHeart(x, y, s, c, e) {
            ctx.save(); ctx.translate(x, y); ctx.beginPath();
            ctx.bezierCurveTo(-s/2,-s/2,-s,s/4,0,s); ctx.bezierCurveTo(s,s/4,s/2,-s/2,0,0);
            ctx.fillStyle = e ? "#222" : c; ctx.fill(); ctx.restore();
        }

        function engine() {
            if(live) {
                let s = cfg.spd + (score/2000);
                p.dy += cfg.grav; p.y += p.dy;
                if(p.y > 350) { p.y = 350; p.dy = 0; p.jc = 0; }
                if(p.inv > 0) p.inv--;
                score += s/10; cfg.timer -= s;

                if(cfg.timer <= 0) {
                    obs.push({ x: 950, y: 375, w: 22, h: 22, s: s });
                    if(Math.random() < 0.1) items.push({ x: 1050, y: 220 });
                    cfg.timer = (400 + Math.random() * 400) * (15/s);
                }

                obs.forEach((o, i) => {
                    o.x -= o.s;
                    if(p.inv <= 0 && p.x < o.x + o.w && p.x + 35 > o.x && p.y + 40 > o.y) {
                        p.hp--; p.inv = 60;
                        if(p.hp <= 0) {
                            live = false;
                            const b = localStorage.getItem('nr_best_v3') || 0;
                            if(score > b) localStorage.setItem('nr_best_v3', score);
                            updateRecord(); ovl.style.display = 'flex';
                        }
                    }
                    if(o.x < -50) obs.splice(i, 1);
                });
                items.forEach((it, i) => {
                    it.x -= s;
                    if(Math.abs(p.x - it.x) < 40 && Math.abs(p.y - it.y) < 60) {
                        if(p.hp < 3) p.hp++;
                        items.splice(i, 1);
                    }
                });
                document.getElementById('st').innerText = "SCORE: " + Math.floor(score);
            }

            ctx.fillStyle = "#050508"; ctx.fillRect(0,0,900,450);
            ctx.strokeStyle = "#333"; ctx.lineWidth = 2; ctx.strokeRect(0, 397, 900, 2);
            for(let i=0; i<3; i++) drawHeart(50+(i*35), 50, 15, "#ffcc00", i>=p.hp);
            if(p.inv % 10 < 5) {
                ctx.fillStyle = p.jc === 2 ? var(--gold) : "#00f2ff";
                ctx.fillRect(p.x, p.y, 40, 45);
            }
            ctx.fillStyle = "#ff0077"; obs.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));
            items.forEach(it => drawHeart(it.x, it.y, 15, "#ffcc00", false));
            requestAnimationFrame(engine);
        }
        engine();
    };
    </script>
</body>
</html>
