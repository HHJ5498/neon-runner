<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON DASH: RESPONSIVE</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7503206245117361" crossorigin="anonymous"></script>

    <style>
        :root { --neon: #00f2ff; --pink: #ff0077; --gold: #ffcc00; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        /* 전체 화면 설정: 여백(safe-area) 확보 */
        body { 
            height: 100vh; background: #000; overflow: hidden; 
            display: flex; flex-direction: column; 
            font-family: -apple-system, system-ui, sans-serif; 
            color: white;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        
        /* 게임 뷰: 화면 크기에 맞춰 유동적으로 변화 */
        #game-view { 
            position: relative; flex: 1; width: 100%; 
            display: flex; justify-content: center; align-items: center;
            background: #050508; overflow: hidden; 
        }
        
        /* 캔버스: 해상도 유지를 위해 고정비율 유지하며 확장 */
        canvas { 
            max-width: 100%; max-height: 100%; 
            object-fit: contain; 
            z-index: 1; touch-action: none; 
        }
        
        /* 메뉴 레이어: 모바일에서 안 잘리도록 padding과 스크롤 허용 */
        .overlay { 
            position: absolute; inset: 0; 
            background: rgba(0, 0, 0, 0.9); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 9999; padding: 20px; 
            overflow-y: auto; /* 내용이 많으면 스크롤 가능하게 */
        }
        
        #title { font-size: clamp(20px, 5vw, 28px); font-weight: 900; text-shadow: 0 0 15px var(--neon); margin-bottom: 15px; }
        
        .settings-box { 
            background: #111; padding: 15px; border-radius: 15px; border: 1px solid var(--neon); 
            width: 100%; max-width: 300px; margin-bottom: 10px; 
        }
        .setting-item { margin-bottom: 10px; }
        .setting-item label { color: #888; font-size: 11px; font-weight: bold; display: block; margin-bottom: 4px; text-align: left; }
        input[type="range"] { width: 100%; height: 25px; cursor: pointer; accent-color: var(--neon); }
        .val-display { color: var(--neon); font-size: 16px; font-weight: 900; }

        .rank-box { 
            width: 100%; max-width: 300px; background: #0a0a0a; 
            border: 1px solid #333; border-radius: 12px; padding: 8px; margin-bottom: 10px; 
        }
        .rank-title { color: var(--gold); font-size: 12px; font-weight: bold; margin-bottom: 5px; border-bottom: 1px solid #222; }
        #rank-list { list-style: none; text-align: left; font-size: 12px; }
        #rank-list li { display: flex; justify-content: space-between; padding: 2px 5px; color: #ccc; }

        .btn-start { background: var(--neon); color: #000; padding: 12px 50px; font-size: 18px; font-weight: 900; border-radius: 50px; cursor: pointer; border: none; }

        /* 하단 바: 모바일 네비게이션바 고려 */
        #stat-bar { 
            width: 100%; height: 45px; background: #000; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px; border-top: 1px solid #222; font-size: 13px;
        }
        
        #ad-area { 
            width: 100%; min-height: 50px; background: #000; 
            display: flex; justify-content: center; align-items: center; 
        }
    </style>
</head>
<body>

    <div id="game-view">
        <canvas id="cvs"></canvas>
        <div id="ovl" class="overlay">
            <div id="title">NEON DASH AI</div>
            
            <div class="rank-box">
                <div class="rank-title">🏆 TOP 5</div>
                <ul id="rank-list"></ul>
            </div>

            <div class="settings-box">
                <div class="setting-item">
                    <label>SPEED</label>
                    <input type="range" id="speed-slider" min="1" max="16" value="10">
                    <div id="speed-display" class="val-display">10</div>
                </div>
                <div class="setting-item">
                    <label>OBSTACLE SIZE</label>
                    <input type="range" id="size-slider" min="5" max="40" value="15">
                    <div id="size-display" class="val-display">15px</div>
                </div>
            </div>
            
            <button class="btn-start" id="start-btn">START</button>
        </div>
    </div>

    <div id="stat-bar">
        <div id="score-txt" style="font-weight:900;">SCORE: 0</div>
        <div style="width: 70px; height: 6px; background: #222; border-radius: 3px; overflow: hidden;">
            <div id="f-fill" style="width: 0%; height: 100%; background: linear-gradient(90deg, #00f2ff, #ff0077);"></div>
        </div>
        <div id="best-txt" style="color:var(--gold);">BEST: 0</div>
    </div>

    <div id="ad-area">
        <ins class="adsbygoogle"
             style="display:inline-block;width:320px;height:50px"
             data-ad-client="ca-pub-7503206245117361"
             data-ad-slot="9998817128"></ins>
        <script>try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}</script>
    </div>

    <script>
    const cvs = document.getElementById('cvs');
    const ctx = cvs.getContext('2d');
    
    // 캔버스 논리적 해상도 고정 (이 비율을 유지하며 화면에 꽉 참)
    cvs.width = 900; cvs.height = 450;

    const COLORS = { neon: '#00f2ff', pink: '#ff0077', gold: '#ffcc00', bg: '#050508' };
    const sSpeed = document.getElementById('speed-slider');
    const sSize = document.getElementById('size-slider');
    const dSpeed = document.getElementById('speed-display');
    const dSize = document.getElementById('size-display');
    const ovl = document.getElementById('ovl');

    let config = { baseSpeed: 10, obsSize: 15, j1: -21, j2: -18, g: 1.2, timer: 0 };
    let player = { x: 120, y: 350, dy: 0, jCount: 0 };
    let obs = [], coins = [], isLive = false, score = 0, gauge = 0, isFever = false;

    // 랭킹 시스템
    function updateRankBoard() {
        let ranks = JSON.parse(localStorage.getItem('neon_ranks') || '[]');
        ranks.sort((a,b) => b - a);
        document.getElementById('rank-list').innerHTML = ranks.slice(0, 5).map((s, i) => `<li>#${i+1} <b>${Math.floor(s)}</b></li>`).join('') || "No Record";
        document.getElementById('best-txt').innerText = "BEST: " + (ranks[0] ? Math.floor(ranks[0]) : 0);
    }

    sSpeed.oninput = () => { config.baseSpeed = parseInt(sSpeed.value); dSpeed.innerText = sSpeed.value; };
    sSize.oninput = () => { config.obsSize = parseInt(sSize.value); dSize.innerText = sSize.value + "px"; };

    function startGame() {
        isLive = true; score = 0; gauge = 0; isFever = false;
        player.y = 350; player.dy = 0; player.jCount = 0;
        obs = []; coins = [];
        ovl.style.display = 'none';
    }

    function gameOver() {
        isLive = false;
        let ranks = JSON.parse(localStorage.getItem('neon_ranks') || '[]');
        ranks.push(score);
        ranks.sort((a,b) => b - a);
        localStorage.setItem('neon_ranks', JSON.stringify(ranks.slice(0, 10)));
        updateRankBoard();
        document.getElementById('title').innerText = "GAME OVER";
        ovl.style.display = 'flex';
    }

    function handleInput(e) {
        if (!isLive || e.target.closest('.settings-box')) return;
        if (player.jCount < 2) {
            let s = (config.baseSpeed + (score/2000)) * (isFever ? 1.4 : 1);
            let force = -(17 + (s * 0.75));
            player.dy = (player.jCount === 0) ? force : force * 0.8;
            player.jCount++;
        }
        if(e.cancelable) e.preventDefault();
    }

    document.getElementById('start-btn').onclick = (e) => { e.stopPropagation(); startGame(); };
    window.addEventListener('mousedown', handleInput);
    window.addEventListener('touchstart', handleInput, { passive: false });

    function update() {
        if(!isLive) return;
        let s = (config.baseSpeed + (score/2000)) * (isFever ? 1.4 : 1);
        player.g = s < 10 ? 0.7 + (s * 0.05) : 1.1 + (s * 0.04);
        score += s / 15;
        player.dy += player.g; player.y += player.dy;
        if(player.y > 350) { player.y = 350; player.dy = 0; player.jCount = 0; }

        config.timer -= s;
        if(config.timer <= 0 && !isFever) {
            let py = Math.random() > 0.5 ? 395 : 250;
            obs.push({ x: 950, y: py - config.obsSize, w: config.obsSize, h: config.obsSize, s: s });
            config.timer = 200 + Math.random() * 200;
        }
        if(Math.random() < 0.02) coins.push({ x: 950, y: 200 + Math.random() * 150 });

        obs.forEach((o, i) => {
            o.x -= o.s;
            if(!isFever && Math.abs((player.x + 20) - (o.x + o.w/2)) < (18 + o.w/2) && Math.abs((player.y + 22) - (o.y + o.h/2)) < (20 + o.h/2)) gameOver();
            if(o.x < -100) obs.splice(i, 1);
        });

        coins.forEach((c, i) => {
            c.x -= s;
            if(isFever) { c.x += (player.x - c.x) * 0.2; c.y += (player.y - c.y) * 0.2; }
            if(Math.abs(player.x - c.x) < 50 && Math.abs(player.y - c.y) < 50) {
                coins.splice(i, 1);
                gauge = Math.min(100, gauge + 10);
                if(gauge >= 100) isFever = true;
            }
            if(c.x < -100) coins.splice(i, 1);
        });
        if(isFever) { gauge -= 0.5; if(gauge <= 0) isFever = false; }

        document.getElementById('score-txt').innerText = "SCORE: " + Math.floor(score);
        document.getElementById('f-fill').style.width = gauge + "%";
    }

    function draw() {
        ctx.fillStyle = COLORS.bg; ctx.fillRect(0, 0, 900, 450);
        ctx.strokeStyle = isFever ? COLORS.pink : '#222';
        ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0, 395); ctx.lineTo(900, 395); ctx.stroke();
        ctx.fillStyle = isFever ? '#fff' : (player.jCount === 2 ? COLORS.gold : COLORS.neon);
        ctx.fillRect(player.x, player.y, 40, 45);
        ctx.fillStyle = COLORS.pink;
        obs.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));
        ctx.fillStyle = COLORS.gold;
        coins.forEach(c => { ctx.beginPath(); ctx.arc(c.x, c.y, 8, 0, 7); ctx.fill(); });
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    updateRankBoard();
    loop();
    </script>
</body>
</html>
