<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Runner</title>
    <style>
        :root { --gold: #ffcc00; --neon: #00f2ff; --pink: #ff0077; --bg: #050508; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        html, body { height: 100%; width: 100%; background: #000; font-family: sans-serif; overflow: hidden; }
        body { display: flex; flex-direction: column; }

        #game-area { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: var(--bg); padding: 10px; }
        #canvas-box { 
            position: relative; width: 100%; max-width: 900px; height: 500px; 
            background: #000; border: 2px solid #333; border-radius: 15px; overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
        }

        @media (max-width: 600px) {
            #canvas-box { max-width: 100%; height: 85vh; } 
        }

        canvas { width: 100%; height: 100%; display: block; }

        #ovl { 
            position: absolute; inset: 0; background: rgba(0, 0, 0, 0.85); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }

        #title { font-size: 32px; font-weight: 900; color: var(--gold); margin-bottom: 20px; text-shadow: 0 0 20px var(--gold); }
        #ranking-box { width: 240px; background: rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 15px; margin-bottom: 25px; border: 1px solid #444; }
        .rank-item { display: flex; justify-content: space-between; font-size: 14px; margin: 6px 0; color: #eee; font-family: monospace; }
        .btn-start { background: var(--gold); color: #000; padding: 18px 70px; font-size: 24px; font-weight: 900; border-radius: 50px; border: none; cursor: pointer; transition: 0.2s; }

        #stat-bar { height: 55px; background: #111; display: flex; justify-content: space-between; align-items: center; padding: 0 25px; border-top: 1px solid #222; font-weight: bold; }
        #ad-box { height: 75px; background: #000; display: flex; justify-content: center; align-items: center; border-top: 1px solid #222; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="game-area">
        <div id="canvas-box">
            <canvas id="cvs"></canvas>
            <div id="ovl">
                <div id="title">Neon Runner</div>
                <div id="ranking-box"></div>
                <button class="btn-start" id="start-btn">START GAME</button>
            </div>
        </div>
    </div>

    <div id="stat-bar">
        <div id="now-score" style="color:var(--neon)">SCORE: 0</div>
        <div id="top-score" style="color:var(--gold)">TOP: 0</div>
    </div>

    <div id="ad-box">
        <ins class="adsbygoogle" style="display:block; width:320px; height:50px" data-ad-client="ca-pub-7503206245117361" data-ad-slot="9285335402"></ins>
        <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7503206245117361" crossorigin="anonymous"></script>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <script>
    const cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
    const ovl = document.getElementById('ovl'), startBtn = document.getElementById('start-btn');

    let isLive = false, score = 0, isMobile;
    let p, obs = [], cfg;

    function initEnv() {
        isMobile = window.innerWidth <= 600;
        cvs.width = isMobile ? 600 : 1200;
        cvs.height = isMobile ? 1000 : 600; 
        
        const gY = cvs.height - 100;
        
        p = { 
            x: isMobile ? 80 : 180, 
            y: gY - 60, 
            dy: 0, 
            jc: 0, 
            hp: 3, 
            inv: 0,
            w: 45, 
            h: 60 
        };

        // [난이도 조정] 시작 속도를 낮추고(8~10), 가속도를 세밀하게 설정
        cfg = { 
            spd: isMobile ? 8 : 10,  // 시작 속도 하향 (여유 있는 시작)
            baseSpd: isMobile ? 8 : 10,
            grav: isMobile ? 3.8 : 4.2, 
            jump: isMobile ? -52 : -55, 
            next: 0, 
            gap: isMobile ? 700 : 900 // 초기 간격을 넓혀서 쉽게 시작
        };
        obs = []; score = 0;
    }

    function updateRank() {
        const ranks = JSON.parse(localStorage.getItem('neon_vFinal_v2') || "[]");
        const list = document.querySelector('#ranking-box');
        list.innerHTML = '<div style="text-align:center;color:#ffcc00;font-weight:bold;margin-bottom:10px;">TOP 5 RANKING</div>';
        ranks.slice(0, 5).forEach((s, i) => {
            list.innerHTML += `<div class="rank-item"><span>${i+1}ST</span><span>${Math.floor(s)}</span></div>`;
        });
        if(ranks.length === 0) list.innerHTML += '<div style="text-align:center;opacity:0.5;font-size:12px;">No Record</div>';
        document.getElementById('top-score').innerText = "TOP: " + (ranks[0] ? Math.floor(ranks[0]) : 0);
    }

    startBtn.onclick = (e) => {
        e.stopPropagation();
        initEnv();
        isLive = true;
        ovl.style.display = 'none';
    };

    const handleAction = (e) => {
        if(!isLive) return;
        if(p.jc < 2) { 
            p.dy = cfg.jump; 
            p.jc++; 
        }
    };
    window.addEventListener('pointerdown', handleAction);

    function loop() {
        const gY = cvs.height - 100;
        if(isLive) {
            // [난이도 로직] 시간에 따라 아주 천천히 가속 (0.002 -> 0.0018)
            cfg.spd += 0.0018; 
            p.dy += cfg.grav; 
            p.y += p.dy;

            if(p.y < 0) { p.y = 0; p.dy = 0; }
            if(p.y >= gY - p.h) { 
                p.y = gY - p.h; 
                p.dy = 0; 
                p.jc = 0; 
            }

            score += cfg.spd / 10;
            cfg.next -= cfg.spd;

            if(cfg.next <= 0) {
                let h = Math.random() > 0.7 ? 40 : 80; 
                obs.push({ x: cvs.width + 100, y: gY - h, w: 35, h: h });
                
                // [난이도 로직] 속도가 빨라질수록 장애물 생성 간격을 유동적으로 조절
                let currentGap = cfg.gap * (cfg.baseSpd / cfg.spd);
                cfg.next = (Math.max(currentGap, 400) + Math.random() * 300);
            }

            obs.forEach((o, i) => {
                o.x -= cfg.spd;
                if(p.inv <= 0 && p.x + 10 < o.x + o.w && p.x + p.w - 10 > o.x && p.y + 10 < o.y + o.h && p.y + p.h - 5 > o.y) {
                    p.hp--; p.inv = 60;
                    if(p.hp <= 0) {
                        isLive = false;
                        let r = JSON.parse(localStorage.getItem('neon_vFinal_v2') || "[]");
                        r.push(score); r.sort((a,b)=>b-a);
                        localStorage.setItem('neon_vFinal_v2', JSON.stringify(r.slice(0, 5)));
                        updateRank();
                        ovl.style.display = 'flex';
                    }
                }
                if(o.x < -150) obs.splice(i, 1);
            });
            if(p.inv > 0) p.inv--;
            document.getElementById('now-score').innerText = "SCORE: " + Math.floor(score);
        }

        ctx.fillStyle = "#050508"; ctx.fillRect(0, 0, cvs.width, cvs.height);
        ctx.strokeStyle = "#444"; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.moveTo(0, gY); ctx.lineTo(cvs.width, gY); ctx.stroke();
        
        ctx.shadowBlur = 15; ctx.shadowColor = "#00f2ff";
        ctx.fillStyle = (p.inv % 10 < 5) ? "#00f2ff" : "rgba(0,242,255,0.2)";
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.shadowBlur = 0;

        ctx.fillStyle = "#ffcc00";
        for(let i=0; i<p.hp; i++) ctx.fillRect(25 + (i*30), 25, 18, 18);

        ctx.fillStyle = "#ff0077";
        obs.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));

        requestAnimationFrame(loop);
    }

    initEnv();
    updateRank();
    loop();
    </script>
</body>
</html>
