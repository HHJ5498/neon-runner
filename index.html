<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON DASH: PRO TUNED</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7503206245117361" crossorigin="anonymous"></script>

    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff0077; --gold: #ffcc00; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; background: #000; overflow: hidden; position: fixed; display: flex; flex-direction: column; user-select: none; -webkit-user-select: none; }
        #game-view { position: relative; flex: 1; width: 100%; display: flex; background: #010103; overflow: hidden; }
        canvas { width: 100%; height: auto; max-height: 100%; margin: auto; display: block; background: #000; }
        #stat-bar { width: 100%; height: 55px; background: #080808; border-top: 1px solid #333; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        #ad-bottom-zone { width: 100%; height: 60px; background: #000; display: flex; justify-content: center; align-items: center; border-top: 1px solid #222; }
        .label { font-size: 10px; color: #555; font-weight: bold; }
        .val { color: white; font-size: 16px; font-weight: 900; }
        .fever-wrap { width: 60px; height: 8px; background: #111; border-radius: 4px; overflow: hidden; border: 1px solid #444; }
        #fever-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink)); }
        .overlay { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .btn-start { background: var(--neon-blue); color: #000; padding: 20px 60px; font-size: 24px; font-weight: 900; border-radius: 50px; box-shadow: 0 0 25px var(--neon-blue); cursor: pointer; border: none; }
        #title { color: #fff; font-size: 32px; margin-bottom: 30px; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 10px var(--neon-blue); }
        #mode-info { color: var(--gold); font-size: 12px; margin-top: 10px; font-weight: bold; font-family: monospace; }
    </style>
</head>
<body>

    <div id="game-view">
        <canvas id="cvs"></canvas>
        <div id="ovl" class="overlay">
            <div id="title">NEON DASH</div>
            <button class="btn-start" id="start-btn">START GAME</button>
            <div id="mode-info">ANALYZING SYSTEM...</div>
        </div>
    </div>

    <div id="stat-bar">
        <div><div class="label">SCORE</div><div id="score" class="val">0</div></div>
        <div><div class="label">FEVER</div><div class="fever-wrap"><div id="fever-fill"></div></div></div>
        <div><div class="label">ENERGY</div><div id="coins" class="val" style="color:var(--gold);">0%</div></div>
    </div>

    <div id="ad-bottom-zone">
        <ins class="adsbygoogle" style="display:inline-block;width:320px;height:50px" data-ad-client="ca-pub-7503206245117361" data-ad-slot="9998817128"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <script src="cordova.js" async></script>

<script>
    const cvs = document.getElementById('cvs');
    const ctx = cvs.getContext('2d');
    cvs.width = 900; cvs.height = 450;

    // 💡 [PRO TUNING] 기기별 최적화 물리 파라미터
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    const config = {
        // 모바일은 25% 더 빠르게, PC는 안정감 있게 설정
        baseSpeed: isMobile ? 24 : 18,     
        jumpPower: isMobile ? -27 : -23,   // 속도가 빠를수록 점프도 더 높아야 함
        gravity: 1.5,
        spawnRate: isMobile ? 22 : 32      // 모바일은 장애물이 더 자주 나옴
    };
    
    document.getElementById('mode-info').innerText = isMobile ? "SYSTEM: ANDROID_MOBILE / MODE: SPEED" : "SYSTEM: DESKTOP_PC / MODE: STABLE";

    const game = {
        isLive: false, score: 0, gauge: 0, frame: 0, fever: false,
        start() {
            this.isLive = true; this.score = 0; this.gauge = 0; this.frame = 0;
            p.y = 350; p.dy = 0; p.jCount = 0; obs = []; coins = [];
            document.getElementById('ovl').style.display = 'none';
        },
        end() {
            this.isLive = false;
            document.getElementById('title').innerText = "GAME OVER";
            document.getElementById('ovl').style.display = 'flex';
        }
    };

    const p = { x: 120, y: 350, dy: 0, g: config.gravity, j: config.jumpPower, jCount: 0 };
    let obs = [], coins = [];

    // 입력 처리 (통합)
    const btn = document.getElementById('start-btn');
    btn.onclick = (e) => { e.preventDefault(); e.stopPropagation(); game.start(); };

    function handleAction(e) {
        if (!game.isLive || e.target.id === 'start-btn') return;
        if (p.jCount < 2) { 
            p.dy = p.j; 
            p.jCount++; 
        }
    }

    window.addEventListener('mousedown', handleAction);
    window.addEventListener('touchstart', (e) => { handleAction(e); if(e.cancelable) e.preventDefault(); }, { passive: false });

    function update() {
        if(!game.isLive) return;
        game.frame++;
        
        // 시간이 지날수록 미세하게 빨라지는 가속도 공식
        let speedMult = game.fever ? 1.6 : 1;
        let currentSpeed = (config.baseSpeed + (game.score/600)) * speedMult; 
        game.score += currentSpeed / 12; // 점수 증가율 최적화
        
        p.dy += p.g; p.y += p.dy;
        if(p.y > 350) { p.y = 350; p.dy = 0; p.jCount = 0; }

        // 장애물 생성
        if(!game.fever) {
            if(game.frame % config.spawnRate === 0) {
                obs.push({ x: 950, y: Math.random() > 0.4 ? 350 : 200, s: currentSpeed });
            }
            if(game.frame % 45 === 0) {
                coins.push({ x: 950, y: 150 + Math.random() * 180 });
            }
        } else {
            game.gauge -= 0.7; // 피버 모드 유지 시간 밸런싱
            if(game.gauge <= 0) game.fever = false;
        }

        obs.forEach((o, i) => {
            o.x -= o.s;
            // 충돌 판정 정교화 (네온 사각형 크기 기반)
            if(!game.fever && Math.abs(p.x - o.x) < 32 && Math.abs(p.y - o.y) < 35) game.end();
            if(o.x < -100) obs.splice(i, 1);
        });

        coins.forEach((c, i) => {
            c.x -= currentSpeed;
            // 자석 효과 (피버 모드일 때)
            if(game.fever) { c.x += (p.x - c.x) * 0.2; c.y += (p.y - c.y) * 0.2; }
            
            if(Math.abs(p.x - c.x) < 50 && Math.abs(p.y - c.y) < 50) {
                coins.splice(i, 1);
                game.gauge = Math.min(100, game.gauge + 8);
                if(game.gauge >= 100 && !game.fever) game.fever = true;
            }
            if(c.x < -100) coins.splice(i, 1);
        });
    }

    function draw() {
        ctx.fillStyle = '#010103'; ctx.fillRect(0,0,900,450);
        
        // 바닥 선 (네온 효과)
        ctx.strokeStyle = game.fever ? '#ff0077' : '#00f2ff';
        ctx.lineWidth = 4; ctx.shadowBlur = 10; ctx.shadowColor = ctx.strokeStyle;
        ctx.beginPath(); ctx.moveTo(0, 395); ctx.lineTo(900, 395); ctx.stroke();
        ctx.shadowBlur = 0;

        // 플레이어
        ctx.fillStyle = game.fever ? '#fff' : '#00f2ff';
        ctx.fillRect(p.x, p.y, 40, 45);

        // 장애물
        ctx.fillStyle = '#ff0077';
        obs.forEach(o => { ctx.fillRect(o.x, o.y, 35, 45); });

        // 코인 (에너지)
        ctx.fillStyle = '#ffcc00';
        coins.forEach(c => { ctx.beginPath(); ctx.arc(c.x, c.y, 9, 0, 7); ctx.fill(); });
        
        // UI 업데이트
        document.getElementById('score').innerText = Math.floor(game.score);
        document.getElementById('coins').innerText = Math.floor(game.gauge) + "%";
        document.getElementById('fever-fill').style.width = game.gauge + "%";
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    loop();
</script>
</body>
</html>
