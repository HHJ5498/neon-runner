<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON DASH: SMART AI EDITION</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7503206245117361" crossorigin="anonymous"></script>

    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff0077; --gold: #ffcc00; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; background: #000; overflow: hidden; display: flex; flex-direction: column; font-family: -apple-system, sans-serif; }
        
        #game-view { position: relative; flex: 1; width: 100%; display: flex; background: #050508; overflow: hidden; }
        canvas { width: 100%; height: auto; max-height: 100%; margin: auto; display: block; z-index: 1; touch-action: none; }
        
        .overlay { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        #title { color: #fff; font-size: 32px; font-weight: 900; text-shadow: 0 0 15px #00f2ff; margin-bottom: 20px; }
        
        .settings-box { background: #111; padding: 20px; border-radius: 20px; border: 1px solid #00f2ff; margin-bottom: 25px; width: 280px; text-align: center; }
        #speed-slider { width: 100%; cursor: pointer; accent-color: #00f2ff; margin: 10px 0; }
        #speed-display { color: #00f2ff; font-size: 28px; font-weight: 900; }
        .btn-start { background: #00f2ff; color: #000; padding: 15px 70px; font-size: 22px; font-weight: 900; border-radius: 50px; cursor: pointer; border: none; box-shadow: 0 0 20px #00f2ff; }

        #stat-bar { width: 100%; height: 55px; background: #000; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-top: 1px solid #222; }
        .val { color: white; font-size: 16px; font-weight: 900; }
        .fever-bar { width: 80px; height: 8px; background: #222; border-radius: 4px; overflow: hidden; }
        #fever-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #00f2ff, #ff0077); }
        
        #ad-container { width: 100%; height: 60px; background: #000; display: flex; justify-content: center; align-items: center; border-top: 1px solid #222; }
    </style>
</head>
<body>

    <div id="game-view">
        <canvas id="cvs"></canvas>
        <div id="ovl" class="overlay">
            <div id="title">NEON DASH AI</div>
            <div class="settings-box">
                <input type="range" id="speed-slider" min="1" max="16" value="10">
                <div id="speed-display">10</div>
            </div>
            <button class="btn-start" id="start-btn">RUN ENGINE</button>
        </div>
    </div>

    <div id="stat-bar">
        <div id="score" class="val">0</div>
        <div class="fever-bar"><div id="fever-fill"></div></div>
        <div id="gauge-text" class="val" style="color:#ffcc00;">0%</div>
    </div>

    <div id="ad-container">
        <ins class="adsbygoogle"
             style="display:inline-block;width:320px;height:50px"
             data-ad-client="ca-pub-7503206245117361"
             data-ad-slot="9998817128"></ins>
        <script>
            // 애드센스 로딩 중 에러가 발생해도 게임에 영향을 주지 않도록 예외 처리
            try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) { console.log("Ad Blocked or Load Error"); }
        </script>
    </div>

    <script>
    // 1. 캔버스 및 드로잉 설정
    const cvs = document.getElementById('cvs');
    const ctx = cvs.getContext('2d');
    cvs.width = 900; cvs.height = 450;

    // 캔버스 전용 색상 상수 (CSS 변수가 깨져도 무조건 작동)
    const C = { BLUE: '#00f2ff', PINK: '#ff0077', GOLD: '#ffcc00', BG: '#050508' };

    const slider = document.getElementById('speed-slider');
    const display = document.getElementById('speed-display');
    const ovl = document.getElementById('ovl');
    
    let config = { baseSpeed: 10, j1: -21, j2: -18, g: 1.2, spawnTimer: 0 };
    
    slider.oninput = (e) => {
        config.baseSpeed = parseInt(e.target.value);
        display.innerText = e.target.value;
    };

    const game = {
        isLive: false, score: 0, gauge: 0, fever: false,
        patterns: [{y:350}, {y:350, next:200}, {y:200}, {y:350, next:350}],
        start() {
            this.isLive = true; this.score = 0; this.gauge = 0;
            p.y = 350; p.dy = 0; p.jCount = 0;
            obs = []; coins = [];
            ovl.style.display = 'none';
        },
        over() {
            this.isLive = false;
            document.getElementById('title').innerText = "REBOOT SYSTEM";
            ovl.style.display = 'flex';
        }
    };

    const p = { x: 120, y: 350, dy: 0, jCount: 0 };
    let obs = [], coins = [];

    // 2. 스마트 AI 엔진 (물리 및 패턴)
    function syncAI(speed) {
        // 속도가 빠를수록 중력을 높여서 반응성 강화
        p.g = speed < 9 ? 0.7 + (speed * 0.05) : 1.1 + (speed * 0.04);
        config.j1 = -(17 + (speed * 0.7)); // 1단 점프
        config.j2 = config.j1 * 0.82;      // 2단 점프
    }

    function spawnAI(speed) {
        const pattern = game.patterns[Math.floor(Math.random() * game.patterns.length)];
        obs.push({ x: 950, y: pattern.y, s: speed });
        if(pattern.next) {
            setTimeout(() => {
                if(game.isLive) obs.push({ x: 950, y: pattern.next, s: speed });
            }, 5000 / speed); // 속도 비례 안전 간격 계산
        }
    }

    // 3. 입력 시스템 (PC/모바일 터치 간섭 방지)
    function action(e) {
        if (!game.isLive || e.target.id === 'speed-slider') return;
        if (p.jCount < 2) {
            p.dy = (p.jCount === 0) ? config.j1 : config.j2;
            p.jCount++;
        }
        if(e.type === 'touchstart' && e.cancelable) e.preventDefault();
    }

    document.getElementById('start-btn').onclick = (e) => { e.stopPropagation(); game.start(); };
    window.addEventListener('mousedown', action);
    window.addEventListener('touchstart', action, { passive: false });

    // 4. 메인 루프
    function update() {
        if(!game.isLive) return;
        
        let curS = (config.baseSpeed + (game.score/1500)) * (game.fever ? 1.4 : 1);
        syncAI(curS);
        
        game.score += curS / 15;
        p.dy += p.g; p.y += p.dy;
        if(p.y > 350) { p.y = 350; p.dy = 0; p.jCount = 0; }

        config.spawnTimer -= curS;
        if(config.spawnTimer <= 0 && !game.fever) {
            spawnAI(curS);
            config.spawnTimer = 220 + Math.random() * 180;
        }

        if(Math.random() < 0.02) coins.push({ x: 950, y: 180 + Math.random() * 150 });

        obs.forEach((o, i) => {
            o.x -= o.s;
            let hitW = p.jCount === 2 ? 22 : 28; // 2단 점프 중엔 히트박스 보너스
            if(!game.fever && Math.abs(p.x + 20 - (o.x + 17)) < hitW && Math.abs(p.y + 22 - (o.y + 22)) < 30) {
                game.over();
            }
            if(o.x < -100) obs.splice(i, 1);
        });

        coins.forEach((c, i) => {
            c.x -= curS;
            if(game.fever) { c.x += (p.x - c.x) * 0.2; c.y += (p.y - c.y) * 0.2; }
            if(Math.abs(p.x - c.x) < 50 && Math.abs(p.y - c.y) < 50) {
                coins.splice(i, 1);
                game.gauge = Math.min(100, game.gauge + 10);
                if(game.gauge >= 100 && !game.fever) game.fever = true;
            }
            if(c.x < -100) coins.splice(i, 1);
        });

        if(game.fever) { game.gauge -= 0.5; if(game.gauge <= 0) game.fever = false; }

        document.getElementById('score').innerText = Math.floor(game.score);
        document.getElementById('gauge-text').innerText = Math.floor(game.gauge) + "%";
        document.getElementById('fever-fill').style.width = game.gauge + "%";
    }

    function draw() {
        ctx.fillStyle = C.BG; ctx.fillRect(0, 0, 900, 450);
        ctx.strokeStyle = game.fever ? C.PINK : '#222';
        ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0, 395); ctx.lineTo(900, 395); ctx.stroke();
        
        ctx.fillStyle = game.fever ? '#fff' : (p.jCount === 2 ? C.GOLD : C.BLUE);
        ctx.fillRect(p.x, p.y, 40, 45);

        ctx.fillStyle = C.PINK;
        obs.forEach(o => ctx.fillRect(o.x, o.y, 35, 45));
        
        ctx.fillStyle = C.GOLD;
        coins.forEach(c => { ctx.beginPath(); ctx.arc(c.x, c.y, 8, 0, 7); ctx.fill(); });
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    // 엔진 가동
    loop();
    </script>
</body>
</html>
