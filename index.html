<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Runner : 동체시력키우기</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7503206245117361" crossorigin="anonymous"></script>
    <style>
        :root { --gold: #ffcc00; --neon: #00f2ff; --pink: #ff0077; --bg: #050508; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; touch-action: none; }
        
        html, body { height: 100%; width: 100%; background: #000; font-family: sans-serif; color: white; overflow: hidden; }
        body { display: flex; flex-direction: column; }

        /* 게임 영역 */
        #game-area { 
            flex: 1; position: relative; display: flex; justify-content: center; align-items: center; 
            background: var(--bg); overflow: hidden; padding: 10px;
        }

        /* [핵심] 모바일 세로 모드 vs PC 가로 모드 대응 */
        #canvas-box { 
            position: relative; width: 100%; max-width: 500px; 
            /* 기본(PC) 가로 비율 */
            aspect-ratio: 2 / 1; 
        }

        /* 모바일 세로 모드 (화면 너비가 좁을 때) */
        @media (max-width: 600px) {
            #canvas-box { aspect-ratio: 4 / 5; max-width: 100%; }
        }

        canvas { width: 100%; height: 100%; background: #000; border: 2px solid #333; display: block; border-radius: 12px; }

        #ovl { 
            position: absolute; inset: 0; background: rgba(0, 0, 0, 0.9); 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; z-index: 1000; padding: 20px; border-radius: 12px; 
        }

        #title { font-size: 22px; font-weight: 900; color: var(--gold); margin-bottom: 5px; text-shadow: 0 0 15px var(--gold); text-align: center; }
        #ranking-box { width: 100%; max-width: 220px; background: rgba(255, 255, 255, 0.05); border-radius: 10px; padding: 10px; margin-bottom: 20px; border: 1px solid #333; }
        .rank-title { font-size: 13px; color: var(--gold); text-align: center; margin-bottom: 5px; border-bottom: 1px solid #444; padding-bottom: 5px; font-weight: bold; }
        .rank-item { display: flex; justify-content: space-between; font-size: 12px; margin: 4px 0; font-family: monospace; }
        .btn-start { background: var(--gold); color: #000; padding: 15px 50px; font-size: 18px; font-weight: 900; border-radius: 50px; border: none; cursor: pointer; }

        /* 하단 바 및 광고 */
        #stat-bar { height: 50px; background: #111; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; font-size: 13px; border-top: 1px solid #222; }
        #ad-box { height: 70px; background: #000; display: flex; justify-content: center; align-items: center; border-top: 1px solid #222; }
    </style>
</head>
<body>

    <div id="game-area">
        <div id="canvas-box">
            <canvas id="cvs"></canvas>
            <div id="ovl">
                <div id="title">Neon Runner</div>
                <div id="ranking-box">
                    <div class="rank-title">TOP 5 RANKING</div>
                    <div id="rank-list"></div>
                </div>
                <button class="btn-start" id="start-btn">START GAME</button>
            </div>
        </div>
    </div>

    <div id="stat-bar">
        <div id="now-score">SCORE: 0</div>
        <div id="top-score" style="color:var(--gold);">TOP: 0</div>
    </div>

    <div id="ad-box">
        <ins class="adsbygoogle" style="display:block; width:320px; height:50px" data-ad-client="ca-pub-7503206245117361" data-ad-slot="9285335402"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <script>
    window.onload = function() {
        const cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
        const ovl = document.getElementById('ovl'), startBtn = document.getElementById('start-btn'), rankList = document.getElementById('rank-list');

        let isLive = false, score = 0, isMobile = window.innerWidth <= 600;
        
        // 해상도 설정 (모바일 세로 / PC 가로 분기)
        const setResolution = () => {
            isMobile = window.innerWidth <= 600;
            if(isMobile) {
                cvs.width = 500; cvs.height = 625; // 세로 비율
            } else {
                cvs.width = 900; cvs.height = 450; // 가로 비율
            }
        };
        setResolution();

        let p, obs = [], cfg;
        const groundY = () => cvs.height - 80;

        const initGame = () => {
            p = { x: isMobile ? 50 : 100, y: groundY() - 50, dy: 0, jc: 0, hp: 3, inv: 0 };
            cfg = { 
                spd: isMobile ? 8 : 10, 
                grav: isMobile ? 2.5 : 3.2, 
                jump: isMobile ? -18 : -20,
                next: 0, 
                gap: isMobile ? 400 : 650 
            };
            obs = []; score = 0;
        };

        const updateRankingUI = () => {
            let ranks = JSON.parse(localStorage.getItem('neon_ranks') || "[]");
            rankList.innerHTML = ranks.slice(0, 5).map((s, i) => `<div class="rank-item"><span>${i+1}ST</span><span>${Math.floor(s)}</span></div>`).join('') || "No Record";
            document.getElementById('top-score').innerText = "TOP: " + (ranks[0] ? Math.floor(ranks[0]) : 0);
        };

        startBtn.onclick = () => {
            setResolution();
            initGame();
            isLive = true;
            ovl.style.display = 'none';
        };

        window.addEventListener('pointerdown', (e) => {
            if(!isLive || e.target === startBtn) return;
            if(p.jc < 2) { p.dy = cfg.jump; p.jc++; }
        });

        function loop() {
            if(isLive) {
                cfg.spd += 0.0015;
                p.dy += cfg.grav; p.y += p.dy;
                if(p.y >= groundY() - 50) { p.y = groundY() - 50; p.dy = 0; p.jc = 0; }
                
                score += cfg.spd / 15;
                cfg.next -= cfg.spd;
                if(cfg.next <= 0) {
                    let h = Math.random() > 0.7 ? 40 : 80;
                    obs.push({ x: cvs.width + 50, y: groundY() - h, w: 30, h: h });
                    cfg.next = cfg.gap + Math.random() * 200;
                }

                obs.forEach((o, i) => {
                    o.x -= cfg.spd;
                    if(p.inv <= 0 && p.x < o.x + o.w && p.x + 40 > o.x && p.y < o.y + o.h && p.y + 50 > o.y) {
                        p.hp--; p.inv = 60;
                        if(p.hp <= 0) {
                            isLive = false;
                            let ranks = JSON.parse(localStorage.getItem('neon_ranks') || "[]");
                            ranks.push(score); ranks.sort((a,b)=>b-a);
                            localStorage.setItem('neon_ranks', JSON.stringify(ranks.slice(0, 5)));
                            updateRankingUI();
                            ovl.style.display = 'flex';
                        }
                    }
                    if(o.x < -100) obs.splice(i, 1);
                });
                if(p.inv > 0) p.inv--;
                document.getElementById('now-score').innerText = "SCORE: " + Math.floor(score);
            }

            ctx.fillStyle = "#050508"; ctx.fillRect(0, 0, cvs.width, cvs.height);
            ctx.strokeStyle = "#333"; ctx.lineWidth = 3; ctx.strokeRect(-10, groundY(), cvs.width + 20, 5);
            
            // 캐릭터
            ctx.fillStyle = p.inv % 10 < 5 ? varColor('--neon') : "rgba(0,242,255,0.2)";
            ctx.fillRect(p.x, p.y, 40, 50);
            
            // 체력
            ctx.fillStyle = varColor('--gold');
            for(let i=0; i<p.hp; i++) ctx.fillRect(20 + (i*20), 20, 12, 12);

            // 장애물
            ctx.fillStyle = varColor('--pink');
            obs.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));

            requestAnimationFrame(loop);
        }
        const varColor = (name) => getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        updateRankingUI();
        loop();
    };
    </script>
</body>
</html>
