<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON DASH: FINAL FIX</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7503206245117361" crossorigin="anonymous"></script>

    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff0077; --gold: #ffcc00; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; width: 100%; background: #000; 
            overflow: hidden; position: fixed; 
            display: flex; flex-direction: column;
            user-select: none; -webkit-user-select: none;
        }

        #game-view { position: relative; flex: 1; width: 100%; display: flex; background: #010103; overflow: hidden; }
        canvas { width: 100%; height: auto; max-height: 100%; margin: auto; display: block; background: #000; }

        #stat-bar { 
            width: 100%; height: 55px; background: #080808; border-top: 1px solid #333; 
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px; 
        }

        #ad-bottom-zone {
            width: 100%; height: 60px; background: #000;
            display: flex; justify-content: center; align-items: center; border-top: 1px solid #222;
        }

        .label { font-size: 10px; color: #555; font-weight: bold; }
        .val { color: white; font-size: 16px; font-weight: 900; }
        .fever-wrap { width: 60px; height: 8px; background: #111; border-radius: 4px; overflow: hidden; border: 1px solid #444; }
        #fever-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink)); }

        .overlay { 
            position: absolute; inset: 0; background: rgba(0, 0, 0, 0.85); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
        }
        /* 💡 버튼 크기 확장 및 클릭 영역 확보 */
        .btn-start { 
            background: var(--neon-blue); color: #000; padding: 20px 60px; 
            font-size: 24px; font-weight: 900; border-radius: 50px; 
            box-shadow: 0 0 25px var(--neon-blue); cursor: pointer; border: none;
            display: block; position: relative;
        }
        #title { color: #fff; font-size: 32px; margin-bottom: 30px; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 10px var(--neon-blue); }
    </style>
</head>
<body>

    <div id="game-view">
        <canvas id="cvs"></canvas>
        <div id="ovl" class="overlay">
            <div id="title">NEON DASH</div>
            <button class="btn-start" id="start-btn">게임 시작</button>
        </div>
    </div>

    <div id="stat-bar">
        <div><div class="label">SCORE</div><div id="score" class="val">0</div></div>
        <div><div class="label">FEVER</div><div class="fever-wrap"><div id="fever-fill"></div></div></div>
        <div><div class="label">ENERGY</div><div id="coins" class="val" style="color:var(--gold);">0%</div></div>
    </div>

    <div id="ad-bottom-zone">
        <ins class="adsbygoogle"
             style="display:inline-block;width:320px;height:50px"
             data-ad-client="ca-pub-7503206245117361"
             data-ad-slot="9998817128"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <script src="cordova.js" async></script>

<script>
    const cvs = document.getElementById('cvs');
    const ctx = cvs.getContext('2d');
    cvs.width = 900; cvs.height = 450;

    const game = {
        isLive: false, score: 0, gauge: 0, frame: 0, fever: false,
        start() {
            this.isLive = true; this.score = 0; this.gauge = 0; this.frame = 0;
            p.y = 350; p.dy = 0; p.jCount = 0; obs = []; coins = [];
            document.getElementById('ovl').style.display = 'none';
            console.log("Game Started!");
        },
        end() {
            this.isLive = false;
            document.getElementById('title').innerText = "GAME OVER";
            document.getElementById('ovl').style.display = 'flex';
        }
    };

    const p = { x: 120, y: 350, dy: 0, g: 1.4, j: -24, jCount: 0 };
    let obs = [], coins = [];

    // --- 💡 입력 시스템 완전 개편 ---

    // 1. 게임 시작 버튼 (PC/모바일 공용)
    const btn = document.getElementById('start-btn');
    btn.onclick = (e) => {
        e.preventDefault();
        e.stopPropagation();
        game.start();
    };

    // 2. 점프 제어 (마우스 클릭 & 터치 통합)
    function handleAction(e) {
        if (!game.isLive) return;
        // 버튼 위를 클릭한 경우는 점프하지 않음
        if (e.target.id === 'start-btn') return;

        if (p.jCount < 2) { 
            p.dy = p.j; 
            p.jCount++; 
            console.log("Jump!");
        }
    }

    // PC 마우스용
    window.addEventListener('mousedown', handleAction);
    // 모바일 터치용
    window.addEventListener('touchstart', (e) => {
        handleAction(e);
        if(e.cancelable) e.preventDefault();
    }, { passive: false });


    function update() {
        if(!game.isLive) return;
        game.frame++;
        let speed = (18 + (game.score/700)) * (game.fever ? 1.7 : 1); 
        game.score += speed / 10;
        p.dy += p.g; p.y += p.dy;
        if(p.y > 350) { p.y = 350; p.dy = 0; p.jCount = 0; }

        if(!game.fever) {
            if(game.frame % 30 === 0) obs.push({ x: 950, y: Math.random() > 0.5 ? 200 : 350, s: speed });
            if(game.frame % 40 === 0) coins.push({ x: 950, y: 150 + Math.random() * 200 });
        } else {
            game.gauge -= 0.5; if(game.gauge <= 0) game.fever = false;
        }

        obs.forEach((o, i) => {
            o.x -= o.s;
            if(!game.fever && Math.abs(p.x - o.x) < 30 && Math.abs(p.y - o.y) < 30) game.end();
            if(o.x < -100) obs.splice(i, 1);
        });

        coins.forEach((c, i) => {
            c.x -= speed;
            if(Math.abs(p.x - c.x) < 50 && Math.abs(p.y - c.y) < 50) {
                coins.splice(i, 1);
                game.gauge = Math.min(100, game.gauge + 10);
                if(game.gauge >= 100) game.fever = true;
            }
            if(c.x < -100) coins.splice(i, 1);
        });

        document.getElementById('score').innerText = Math.floor(game.score);
        document.getElementById('coins').innerText = Math.floor(game.gauge) + "%";
        document.getElementById('fever-fill').style.width = game.gauge + "%";
    }

    function draw() {
        ctx.clearRect(0, 0, 900, 450);
        ctx.fillStyle = '#010103'; ctx.fillRect(0,0,900,450);
        ctx.strokeStyle = game.fever ? '#ff0077' : '#00f2ff';
        ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(0, 395); ctx.lineTo(900, 395); ctx.stroke();
        ctx.fillStyle = '#00f2ff'; ctx.fillRect(p.x, p.y, 40, 45);
        ctx.fillStyle = '#ff0077'; obs.forEach(o => { ctx.fillRect(o.x, o.y, 35, 45); });
        ctx.fillStyle = '#ffcc00'; coins.forEach(c => { ctx.beginPath(); ctx.arc(c.x, c.y, 8, 0, 7); ctx.fill(); });
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    loop();
</script>
</body>
</html>
